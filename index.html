<script>
/* ====================================================001 – CONFIG==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="SUA_CHAVE_AQUI"
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* ====================================================002 – ESTADO==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let visibilidade={}
let graficoResumo=null
let graficoMensal=null
let modoEdicao=false
let edicoesTemp={}
let filtroInicio=null
let filtroFim=null
let modoAnoCompleto=false
let mesOffset=0
let mostrarGrafico=true
let LIMITE_USUARIO=20
let PLANO_USUARIO="free"
/* ====================================================003 – CATEGORIAS==================================================== */
const CATEGORIAS=["GERAL","TCERO/Cripto","CASA","SAÚDE","EDUCAÇÃO","LAZER"]
function carregarCategorias(){
const sel=document.getElementById("categoria")
if(!sel)return
sel.innerHTML=CATEGORIAS.map(c=>`<option>${c}</option>`).join("")
}
/* ====================================================003A – USER UI==================================================== */
function setUserUI(){
const nome=localStorage.getItem("usuario_nome_lancamentos")||"Usuário"
const tipo=localStorage.getItem("tipo_usuario_lancamentos")||"user"
const plano=(localStorage.getItem("usuario_plano")||"free").toLowerCase()
/* 🔎 SE NÃO EXISTIR ELEMENTO, IGNORA (evita erro) */
const topo=document.getElementById("userNome")
if(!topo)return

let badgePlano="FREE"
if(plano==="pro")badgePlano="PRO"
if(plano==="analise")badgePlano="ANÁLISE"

topo.innerText=`${nome} • ${badgePlano} • ${tipo==="admin"?"ADMIN":"USER"}`
}
/* ====================================================004 – LOGIN==================================================== */
async function loginSistema(){
const email=document.getElementById("loginUser").value.trim()
const senha=document.getElementById("loginPass").value.trim()
if(!email||!senha){alert("Preencha e-mail e senha");return}
const {data,error}=await supabaseClient.from("usuarios_lancamentos").select("*").eq("email",email).eq("senha",senha).limit(1)
if(error){alert("Erro no login");console.error(error);return}
if(!data||!data.length){alert("Usuário inválido");return}
const user=data[0]
/* 🔐 STATUS */
if(user.status&&user.status!=="aprovado"){
alert("Aguardando liberação do administrador")
return
}
/* 🔥 CONTEXTO */
localStorage.setItem("usuario_id_lancamentos",user.id)
localStorage.setItem("usuario_nome_lancamentos",user.nome||"")
localStorage.setItem("tipo_usuario_lancamentos",user.tipo||"user")
localStorage.setItem("usuario_plano",(user.plano||"free").toLowerCase())
PLANO_USUARIO=(user.plano||"free").toLowerCase()
LIMITE_USUARIO=user.limite||20
/* 🎨 UI */
document.getElementById("telaLogin").style.display="none"
document.getElementById("appSistema").style.display="block"
document.body.classList.remove("login")
document.body.classList.add("app")
setUserUI()
const painelAdmin=document.getElementById("painelAdmin")
const conteudoApp=document.getElementById("conteudoApp")
/* 👑 ADMIN */
if(user.tipo==="admin"){
if(painelAdmin)painelAdmin.style.display="block"
if(conteudoApp)conteudoApp.style.display="none"
await carregarUsuarios()
return
}
/* 👤 USUÁRIO NORMAL */
if(painelAdmin)painelAdmin.style.display="none"
if(conteudoApp)conteudoApp.style.display="block"
/* 🔄 CARREGAMENTO */
await carregar()
/* 🧠 SE NÃO TIVER DADOS → CRIA SUGESTÕES */
if(!dados.length){
await criarPadraoUsuario(user.id)
await carregar()
}
/* 🔁 RECORRÊNCIA */
await gerarRecorrentes()
await carregar()
}
/* ====================================================005 – SESSÃO==================================================== */
async function verificarSessao(){
const id=localStorage.getItem("usuario_id_lancamentos")
if(!id)return
document.getElementById("telaLogin").style.display="none"
document.getElementById("appSistema").style.display="block"
setUserUI()
await carregar()
}

/* ====================================================006 – LOGOUT==================================================== */
function logout(){
localStorage.clear()
location.reload()
}

/* ====================================================007 – CARREGAR==================================================== */
async function carregar(){
const {data}=await supabaseClient.from("lancamentos").select("*").order("data",{ascending:true})
dados=data||[]
const tipo=localStorage.getItem("tipo_usuario_lancamentos")
const userId=localStorage.getItem("usuario_id_lancamentos")
dados=dados.filter(x=>{
if(tipo==="admin")return true
return String(x.usuario_id)===String(userId)
})
render()
}

/* ====================================================008 – SALVAR==================================================== */
async function salvarRegistro(obj){
if(obj.id){
await supabaseClient.from("lancamentos").update(obj).eq("id",obj.id)
}else{
await supabaseClient.from("lancamentos").insert(obj)
}
await carregar()
}
/* ====================================================009 – EXCLUIR==================================================== */
async function del(id){
await supabaseClient.from("lancamentos").delete().eq("id",id)
await carregar()
}

/* ====================================================010 – MARCAR PAGO==================================================== */
async function marcarPago(id){
const item=dados.find(x=>String(x.id)===String(id))
if(!item)return
if(item.pago&&!modoEdicao){alert("Ative modo edição para alterar");return}
const novo=!item.pago
await supabaseClient.from("lancamentos").update({
pago:novo,
data_pagamento:novo?hojeLocal():null
}).eq("id",id)
await carregar()
}

/* ====================================================011 – EDITAR==================================================== */
function editarPorId(id){
const x=dados.find(d=>String(d.id)===String(id))
if(!x)return
editando=x.id
document.getElementById("data").value=x.data||""
document.getElementById("desc").value=x.descricao||""
document.getElementById("tipo").value=x.tipo||"DESPESA"
document.getElementById("categoria").value=x.categoria||"GERAL"
document.getElementById("valor").value=x.valor||0
}

/* ====================================================012 – ADD==================================================== */
async function add(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId){alert("Usuário não autenticado");return}
if(PLANO_USUARIO!=="pro" && dados.length>=LIMITE_USUARIO){mostrarUpgrade();return}
const data=document.getElementById("data").value
const desc=document.getElementById("desc").value.trim()
const tipo=document.getElementById("tipo").value
const categoria=document.getElementById("categoria").value
const valor=parseFloat(document.getElementById("valor").value||0)
if(!data||!desc||!valor){alert("Preencha tudo");return}
await salvarRegistro({
data,descricao:desc,tipo,categoria,valor,pago:false,usuario_id:userId
})
document.getElementById("desc").value=""
document.getElementById("valor").value=""
}
/* ====================================================013 – NORMALIZAR DATA==================================================== */
function normalizarDataLocal(d){
if(!d)return null
const[a,b,c]=d.split("-")
return `${a}-${b}-${c}`
}

/* ====================================================014 – FORMATADORES==================================================== */
function formatarMoeda(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}
function formatarDataBR(d){
if(!d)return""
const[a,b,c]=d.split("-")
return `${c}/${b}/${a}`
}

/* ====================================================015 – DATA LOCAL==================================================== */
function hojeLocal(){
const d=new Date()
return d.toISOString().slice(0,10)
}

/* ====================================================016 – MÊS BASE==================================================== */
function getMesBase(x){
if(!x.data)return
const[ano,mes]=x.data.split("-")
return Number(mes)-1
}
/* ====================================================017 – MODO EDIÇÃO==================================================== */
function toggleModoEdicao(){
modoEdicao=!modoEdicao
document.getElementById("btnSalvar").style.display=modoEdicao?"inline-block":"none"
document.getElementById("btnEditar").innerText=modoEdicao?"Cancelar":"Editar"
if(!modoEdicao)edicoesTemp={}
render()
}

/* ====================================================018 – EDIT TEMP==================================================== */
function editTemp(id,campo,valor){
if(!edicoesTemp[id])edicoesTemp[id]={}
edicoesTemp[id][campo]=valor
}

/* ====================================================019 – SALVAR EDIÇÃO==================================================== */
async function salvarEdicao(id){
const original=dados.find(x=>String(x.id)===String(id))
const alteracoes=edicoesTemp[id]||{}
const atualizado={...original,...alteracoes}
await supabaseClient.from("lancamentos").update(atualizado).eq("id",id)
delete edicoesTemp[id]
await carregar()
}

/* ====================================================020 – TOGGLE VALOR==================================================== */
function toggleValor(id){
visibilidade[id]=!visibilidade[id]
render()
}
/* ====================================================021 – RENDER==================================================== */
function render(){
const lista=document.getElementById("lista")
const resumo=document.getElementById("resumo")
if(!lista||!resumo)return
let listaFiltrada=[...dados]
const hoje=new Date()
const mesAtual=hoje.getMonth()
const anoAtual=hoje.getFullYear()
if(!modoAnoCompleto&&!filtroInicio&&!filtroFim){
listaFiltrada=listaFiltrada.filter(x=>{
if(!x.data)return false
const[a,m]=x.data.split("-")
return Number(m)-1===mesAtual&&Number(a)===anoAtual
})
}
if(filtroInicio)listaFiltrada=listaFiltrada.filter(x=>x.data>=filtroInicio)
if(filtroFim)listaFiltrada=listaFiltrada.filter(x=>x.data<=filtroFim)

/* AGRUPAR */
const grupos={}
listaFiltrada.forEach(x=>{
if(!x.data)return
const[a,m]=x.data.split("-")
const chave=`${a}-${m}`
if(!grupos[chave])grupos[chave]=[]
grupos[chave].push(x)
})

const chaves=Object.keys(grupos).sort().reverse()
lista.innerHTML=""

let totalR=0
let totalDPago=0
let totalDPendente=0

chaves.forEach(chave=>{
let itens=grupos[chave]

itens.sort((a,b)=>{
if(a.tipo==="RECEITA"&&b.tipo!=="RECEITA")return-1
if(a.tipo!=="RECEITA"&&b.tipo==="RECEITA")return 1
return(a.data||"").localeCompare(b.data||"")
})

let r=0
let dPago=0
let dPend=0

itens.forEach(x=>{
const v=Number(x.valor||0)
if(x.tipo==="RECEITA"){r+=v}else{if(x.pago){dPago+=v}else{dPend+=v}}
})

totalR+=r
totalDPago+=dPago
totalDPendente+=dPend

const totalDSP=dPago+dPend
const saldo=r-totalDSP
const[a,m]=chave.split("-")

lista.innerHTML+=`
<div style="margin-top:15px;background:#020617;padding:8px;border-radius:6px;border-left:4px solid #38bdf8;display:flex;justify-content:space-between;flex-wrap:wrap">
<div><b>📅 ${formatarMesNome(m)}/${a}</b></div>
<div style="display:flex;gap:10px;font-size:12px">
<span style="color:#22c55e">R$ ${formatarMoeda(r)}</span>
<span style="color:#22c55e">✔ ${formatarMoeda(dPago)}</span>
<span style="color:#ef4444">⏳ ${formatarMoeda(dPend)}</span>
<span style="color:#f59e0b">💸 ${formatarMoeda(totalDSP)}</span>
<span style="color:${saldo>=0?"#22c55e":"#ef4444"}">${formatarMoeda(saldo)}</span>
</div>
</div>
`

itens.forEach(x=>{
const ed=edicoesTemp[x.id]||{}
const val=ed.valor??x.valor
const desc=ed.descricao??x.descricao
const isR=x.tipo==="RECEITA"

lista.innerHTML+=`
<div data-id="${x.id}" style="display:grid;grid-template-columns:100px 1fr 120px 120px 160px;gap:6px;background:${isR?"#052e16":"#1e293b"};padding:4px;margin:2px 0;border-radius:6px;font-size:12px">
<div>${modoEdicao?`<input type="date" value="${x.data}" onchange="editTemp('${x.id}','data',this.value)">`:formatarDataBR(x.data)}</div>
<div>${modoEdicao?`<input value="${desc}" onchange="editTemp('${x.id}','descricao',this.value)">`:`${isR?"+ ":"- "}${desc}`}</div>
<div>${modoEdicao?`<input value="${x.categoria}" onchange="editTemp('${x.id}','categoria',this.value)">`:x.categoria}</div>
<div>${modoEdicao?`<input type="number" value="${val}" onchange="editTemp('${x.id}','valor',this.value)">`:(isR?(visibilidade[x.id]?"R$ "+formatarMoeda(val):"R$ ***"):"R$ "+formatarMoeda(val))}</div>
<div style="display:flex;gap:4px;justify-content:flex-end">
${isR&&!modoEdicao?`<button onclick="toggleValor('${x.id}')">👁</button>`:""}
<button onclick="marcarPago('${x.id}')" style="background:${x.pago?"#22c55e":"#ef4444"}">${x.pago?"OK":"PEND"}</button>
${modoEdicao?`<button onclick="del('${x.id}')">🗑</button>`:""}
</div>
</div>
`
})

lista.innerHTML+=`
<div style="margin-bottom:15px;padding:6px;background:#111827;border-radius:6px;text-align:right;font-size:12px">
<b>Saldo: ${formatarMoeda(saldo)}</b>
</div>
`
})

const totalDSP=totalDPago+totalDPendente
const saldoFinal=totalR-totalDSP

resumo.innerHTML=`
<div style="display:flex;gap:10px;justify-content:center;font-weight:bold">
<span style="color:#22c55e">R$ ${formatarMoeda(totalR)}</span>
<span style="color:#22c55e">✔ ${formatarMoeda(totalDPago)}</span>
<span style="color:#ef4444">⏳ ${formatarMoeda(totalDPendente)}</span>
<span style="color:#f59e0b">💸 ${formatarMoeda(totalDSP)}</span>
<span style="color:${saldoFinal>=0?"#22c55e":"#ef4444"}">${formatarMoeda(saldoFinal)}</span>
</div>
`

if(mostrarGrafico)atualizarDashboard(listaFiltrada)
}
/* ====================================================022 – DASHBOARD==================================================== */
function atualizarDashboard(base){
if(typeof Chart==="undefined")return
const el1=document.getElementById("graficoResumo")
const el2=document.getElementById("graficoMensal")
if(!el1||!el2)return
if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0
let meses={}

base.forEach(x=>{
if(!x.data)return
const m=getMesBase(x)
if(!meses[m])meses[m]={r:0,d:0}
const v=Number(x.valor||0)
if(x.tipo==="RECEITA"){r+=v;meses[m].r+=v}else{d+=v;meses[m].d+=v}
})

graficoResumo=new Chart(el1,{
type:"doughnut",
data:{labels:["Receita","Despesa"],datasets:[{data:[r,d]}]},
options:{plugins:{legend:{labels:{color:"#fff"}}}}
})

graficoMensal=new Chart(el2,{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{label:"Receita",data:Array.from({length:12},(_,i)=>meses[i]?.r||0)},
{label:"Despesa",data:Array.from({length:12},(_,i)=>meses[i]?.d||0)}
]
},
options:{plugins:{legend:{labels:{color:"#fff"}}}}
})
}
/* ====================================================023 – FILTROS==================================================== */
function filtrarPeriodo(){
filtroInicio=document.getElementById("dataInicio").value||null
filtroFim=document.getElementById("dataFim").value||null
modoAnoCompleto=false
render()
}
function limparPeriodo(){
filtroInicio=null
filtroFim=null
document.getElementById("dataInicio").value=""
document.getElementById("dataFim").value=""
render()
}
function verAnoCompleto(){
modoAnoCompleto=true
filtroInicio=null
filtroFim=null
render()
}

/* ====================================================024 – CONTROLES==================================================== */
function toggleGrafico(){
mostrarGrafico=!mostrarGrafico
document.getElementById("graficoResumo").parentElement.classList.toggle("oculto",!mostrarGrafico)
document.getElementById("graficoMensal").parentElement.classList.toggle("oculto",!mostrarGrafico)
render()
}
function mesAnterior(){
mesOffset--
aplicarMesOffset()
}
function mesAtual(){
mesOffset=0
filtroInicio=null
filtroFim=null
modoAnoCompleto=false
render()
}

/* ====================================================025 – SALVAR TUDO==================================================== */
async function salvarTudo(){
for(const id in edicoesTemp){
const original=dados.find(x=>String(x.id)===String(id))
if(!original)continue
const atualizado={...original,...edicoesTemp[id]}
await supabaseClient.from("lancamentos").update(atualizado).eq("id",id)
}
edicoesTemp={}
modoEdicao=false
document.getElementById("btnSalvar").style.display="none"
document.getElementById("btnEditar").innerText="Editar"
await carregar()
}

/* ====================================================026 – RECORRÊNCIA==================================================== */
async function gerarRecorrentes(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId)return
const hoje=new Date()
const ano=hoje.getFullYear()
const mes=String(hoje.getMonth()+1).padStart(2,"0")
const {data:rec}=await supabaseClient.from("lancamentos").select("*").eq("recorrente",true).eq("usuario_id",userId)
for(const r of (rec||[])){
const dia=String(r.dia_padrao||1).padStart(2,"0")
const nova=`${ano}-${mes}-${dia}`
const {data:existe}=await supabaseClient.from("lancamentos").select("id").eq("data",nova).eq("descricao",r.descricao).limit(1)
if(existe&&existe.length)continue
await supabaseClient.from("lancamentos").insert({...r,data:nova,pago:false})
}
}
/* ====================================================026A – PADRÃO USUÁRIO==================================================== */
async function criarPadraoUsuario(usuarioId){
const hoje=hojeLocal()
const padrao=[
{tipo:"RECEITA",categoria:"GERAL",descricao:"Salário"},
{tipo:"RECEITA",categoria:"GERAL",descricao:"Renda Extra"},
{tipo:"DESPESA",categoria:"CASA",descricao:"Moradia"},
{tipo:"DESPESA",categoria:"CASA",descricao:"Alimentação"},
{tipo:"DESPESA",categoria:"GERAL",descricao:"Transporte"},
{tipo:"DESPESA",categoria:"SAÚDE",descricao:"Saúde"}
]
for(const p of padrao){
await supabaseClient.from("lancamentos").insert({
data:hoje,
descricao:p.descricao,
tipo:p.tipo,
categoria:p.categoria,
valor:0,
pago:false,
usuario_id:usuarioId
})
}
}

const lista=document.getElementById("listaUsuarios")

data.forEach(u=>{

Plano: ${u.plano||"free"}<br>
${u.plano!=="pro"?`<button onclick="tornarPro('${u.id}')">PRO</button>`:""}
<button onclick="rebaixarFree('${u.id}')">FREE</button>
</div>
`

/* ====================================================031 – INIT==================================================== */
async function iniciarSistema(){
carregarCategorias()

const telaLogin=document.getElementById("telaLogin")
const appSistema=document.getElementById("appSistema")

/* 🔥 GARANTE ESTADO INICIAL */
if(telaLogin)telaLogin.style.display="flex"
if(appSistema)appSistema.style.display="none"
document.body.classList.add("login")
document.body.classList.remove("app")

/* 🔐 VERIFICA SESSÃO */
const userId=localStorage.getItem("usuario_id_lancamentos")

if(userId){
if(telaLogin)telaLogin.style.display="none"
if(appSistema)appSistema.style.display="block"
document.body.classList.remove("login")
document.body.classList.add("app")

setUserUI()

const tipo=localStorage.getItem("tipo_usuario_lancamentos")

if(tipo==="admin"){
const painelAdmin=document.getElementById("painelAdmin")
const conteudoApp=document.getElementById("conteudoApp")
if(painelAdmin)painelAdmin.style.display="block"
if(conteudoApp)conteudoApp.style.display="none"
await carregarUsuarios()
}else{
await carregar()

if(!dados.length){
await criarPadraoUsuario(userId)
await carregar()
}

await gerarRecorrentes()
await carregar()
}
}

/* 📅 DATA PADRÃO */
const hoje=hojeLocal()
;["data","dataInicio","dataFim"].forEach(id=>{
const el=document.getElementById(id)
if(el&&!el.value)el.value=hoje
})
}

document.addEventListener("DOMContentLoaded",async()=>{
await iniciarSistema()
})

</script>

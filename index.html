<script>
/* ====================================================001 – CONFIG==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)
/* ====================================================002 – ESTADO==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let visibilidade={}
let graficoResumo=null
let graficoMensal=null
let modoEdicao=false
let edicoesTemp={}
let filtroInicio=null
let filtroFim=null
let modoAnoCompleto=false
let mesOffset=0
let mostrarGrafico=true
/* ====================================================003 – CATEGORIAS==================================================== */
const CATEGORIAS=["GERAL","TCERO/Cripto","CASA","SAÚDE","EDUCAÇÃO","LAZER"]
function carregarCategorias(){
const sel=document.getElementById("categoria")
if(!sel)return
sel.innerHTML=CATEGORIAS.map(c=>`<option>${c}</option>`).join("")
}
/* ====================================================004 – LOGIN==================================================== */
async function loginSistema(){
const email=document.getElementById("loginUser").value.trim()
const senha=document.getElementById("loginPass").value.trim()
if(!email||!senha){alert("Preencha e-mail e senha");return}
const {data,error}=await supabaseClient.from("usuarios_lancamentos").select("*").eq("email",email).eq("senha",senha).single()
if(error||!data){alert("Usuário inválido");return}
if(data.status!=="aprovado"){alert("Aguardando aprovação do administrador");return}
localStorage.setItem("usuario_id_lancamentos",data.id)

document.getElementById("appSistema").style.display="block"
document.body.classList.remove("login")
document.body.classList.add("app")
if(data.tipo==="admin"){
document.getElementById("painelAdmin").style.display="block"
await carregarUsuarios()
}else{
await carregar()
await gerarRecorrentes()
await carregar()
}
}
/* ====================================================005 – SESSÃO==================================================== */
async function verificarSessao(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(userId){
document.getElementById("telaLogin").style.display="none"
document.getElementById("appSistema").style.display="block"
document.body.classList.remove("login")
document.body.classList.add("app")
const tipo=localStorage.getItem("tipo_usuario_lancamentos")
if(tipo==="admin"){
document.getElementById("painelAdmin").style.display="block"
await carregarUsuarios()
}else{
await carregar()
await gerarRecorrentes()
await carregar()
}
}else{
document.getElementById("telaLogin").style.display="flex"
document.getElementById("appSistema").style.display="none"
document.body.classList.add("login")
document.body.classList.remove("app")
}
}
/* ====================================================006 – LOGOUT==================================================== */
async function logout(){
localStorage.removeItem("logado")
await supabaseClient.auth.signOut()
location.reload()
}
/* ====================================================007 – CARREGAR==================================================== */
async function carregar(){
const {data,error}=await supabaseClient.from("lancamentos").select("*").order("data",{ascending:true})
if(error){alert("Erro ao carregar");return}
dados=data||[]
const tipo=localStorage.getItem("tipo_usuario_lancamentos")
const userId=localStorage.getItem("usuario_id_lancamentos")
if(tipo!=="admin"){
dados=dados.filter(x=>x.usuario_id===userId)
}
if(!window._renderLock){
window._renderLock=true
requestAnimationFrame(()=>{
render()
window._renderLock=false
})
}
}
/* ====================================================008 – SALVAR==================================================== */
async function salvarRegistro(obj){
let response
if(obj.id){
response=await supabaseClient.from("lancamentos").update(obj).eq("id",obj.id)
}else{
response=await supabaseClient.from("lancamentos").insert(obj)
}
if(response.error){
console.error("ERRO AO SALVAR:",response.error)
alert("Erro ao salvar: "+response.error.message)
return
}
await carregar()
}
/* ====================================================009 – EXCLUIR==================================================== */
async function del(id){
await supabaseClient.from("lancamentos").delete().eq("id",id)
await carregar()
}
/* ====================================================010 – MARCAR PAGO==================================================== */
async function marcarPago(id){
const item=dados.find(x=>String(x.id)===String(id))
if(!item)return
if(item.pago&&!modoEdicao){
alert("Item já está pago. Para alterar, ative o modo edição.")
return
}
const novoStatus=!item.pago
const dataLocal=hojeLocal()
await supabaseClient.from("lancamentos").update({pago:novoStatus,data_pagamento:novoStatus?dataLocal:null}).eq("id",id)
await carregar()
}
/* ====================================================011 – EDITAR==================================================== */
function editarPorId(id){
const x=dados.find(d=>String(d.id)===String(id))
if(!x)return
editando=x.id
document.getElementById("data").value=x.data||""
document.getElementById("desc").value=x.descricao||""
document.getElementById("tipo").value=x.tipo||"DESPESA"
document.getElementById("categoria").value=x.categoria||"GERAL"
document.getElementById("valor").value=x.valor||0
}
/* ====================================================012 – ADD==================================================== */
async function add(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId){alert("Usuário não autenticado");return}
const dataEl=document.getElementById("data")
const descEl=document.getElementById("desc")
const tipoEl=document.getElementById("tipo")
const categoriaEl=document.getElementById("categoria")
const valorEl=document.getElementById("valor")
const recorrenteEl=document.getElementById("recorrente")
const diaEl=document.getElementById("diaPadrao")
const dataStr=normalizarDataLocal(dataEl.value)
const obj={
data:dataStr,
descricao:descEl.value.trim(),
tipo:tipoEl.value,
categoria:categoriaEl.value||"GERAL",
valor:Number((valorEl.value||"0").replace(/\./g,"").replace(",",".")),
recorrente:(recorrenteEl&&recorrenteEl.checked)||false,
dia_padrao:parseInt((diaEl&&diaEl.value)||0)||null,
dia_vencimento:dataStr?Number(dataStr.split("-")[2]):null,
pago:false,
data_pagamento:null,
usuario_id:userId
}
if(!obj.data||!obj.descricao){alert("Preencha data e descrição");return}
if(!obj.valor||obj.valor===0){alert("Valor inválido");return}
await salvarRegistro(obj)
document.getElementById("desc").value=""
document.getElementById("valor").value=""
document.getElementById("recorrente").checked=false
document.getElementById("diaPadrao").value=""
}
/* ====================================================013 – NORMALIZAR DATA==================================================== */
function normalizarDataLocal(dataStr){
if(!dataStr)return null
const [ano,mes,dia]=dataStr.split("-")
return `${ano}-${mes}-${dia}`
}
/* ====================================================014 – FORMATADORES==================================================== */
function formatarMoeda(v){return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}
function formatarDataBR(d){if(!d)return"";const [ano,mes,dia]=d.split("-");return`${dia}/${mes}/${ano}`}
/* ====================================================000C – DATA LOCAL BRASIL==================================================== */
function hojeLocal(){
const d=new Date()
const ano=d.getFullYear()
const mes=String(d.getMonth()+1).padStart(2,"0")
const dia=String(d.getDate()).padStart(2,"0")
return `${ano}-${mes}-${dia}`
}
/* ====================================================015 – MÊS BASE==================================================== */
function getMesBase(x){
if(!x.data)return
const [ano,mes]=x.data.split("-")
return Number(mes)-1
}
/* ====================================================016 – MODO EDIÇÃO==================================================== */
function toggleModoEdicao(){
modoEdicao=!modoEdicao
document.getElementById("btnSalvar").style.display=modoEdicao?"inline-block":"none"
document.getElementById("btnEditar").innerText=modoEdicao?"❌ Cancelar":"✏️ Editar"
if(!modoEdicao)edicoesTemp={}
render()
}
/* ====================================================017 – EDIT TEMP==================================================== */
function editTemp(id,campo,valor){
if(!edicoesTemp[id])edicoesTemp[id]={}
edicoesTemp[id][campo]=valor
}
/* ====================================================018 – SALVAR EDIÇÃO==================================================== */
async function salvarEdicao(id){
const original=dados.find(x=>String(x.id)===String(id))
if(!original)return
const alteracoes=edicoesTemp[id]||{}
const atualizado={...original,...alteracoes,valor:parseFloat(alteracoes.valor??original.valor)}
await supabaseClient.from("lancamentos").update(atualizado).eq("id",id)
delete edicoesTemp[id]
await carregar()
}
/* ====================================================019 – TOGGLE ITEM==================================================== */
function toggleValor(id){
visibilidade[id]=!visibilidade[id]
render()
}
/* ====================================================020 – APLICAR OFFSET==================================================== */
function aplicarMesOffset(){
const hoje=new Date()
const data=new Date(hoje.getFullYear(),hoje.getMonth()+mesOffset,1)
const ano=data.getFullYear()
const mes=String(data.getMonth()+1).padStart(2,"0")
const ultimoDia=new Date(data.getFullYear(),data.getMonth()+1,0).getDate()
filtroInicio=`${ano}-${mes}-01`
filtroFim=`${ano}-${mes}-${String(ultimoDia).padStart(2,"0")}`
modoAnoCompleto=false
render()
}
/* ====================================================021 – RENDER==================================================== */
function render(){
const lista=document.getElementById("lista")
const totalEl=document.getElementById("total")
const resumoEl=document.getElementById("resumo")
let listaFiltrada=[...dados]
const hoje=new Date()
const mesAtual=hoje.getMonth()
const anoAtual=hoje.getFullYear()
if(!modoAnoCompleto&&!filtroInicio&&!filtroFim){
listaFiltrada=listaFiltrada.filter(x=>{
if(!x.data)return false
const [ano,mes]=x.data.split("-")
return Number(mes)-1===mesAtual&&Number(ano)===anoAtual
})
}
if(filtroInicio)listaFiltrada=listaFiltrada.filter(x=>x.data>=filtroInicio)
if(filtroFim)listaFiltrada=listaFiltrada.filter(x=>x.data<=filtroFim)
const grupos={}
listaFiltrada.forEach(x=>{
if(!x.data)return
const [ano,mes]=x.data.split("-")
const chave=`${ano}-${mes}`
if(!grupos[chave])grupos[chave]=[]
grupos[chave].push(x)
})
const chaves=Object.keys(grupos).sort()
lista.innerHTML=""
let totalGeralR=0
let totalGeralDPago=0
let totalGeralDPendente=0
chaves.forEach(chave=>{
let listaMes=grupos[chave]
listaMes.sort((a,b)=>{
if(a.tipo==="RECEITA"&&b.tipo!=="RECEITA")return-1
if(a.tipo!=="RECEITA"&&b.tipo==="RECEITA")return 1
return(a.data||"").localeCompare(b.data||"")
})
let totalR=0
let totalDPago=0
let totalDPendente=0
listaMes.forEach(x=>{
if(x.tipo==="RECEITA"){totalR+=Number(x.valor||0)}else{if(x.pago){totalDPago+=Number(x.valor||0)}else{totalDPendente+=Number(x.valor||0)}}
})
totalGeralR+=totalR
totalGeralDPago+=totalDPago
totalGeralDPendente+=totalDPendente
const totalDSP=totalDPago+totalDPendente
const saldo=totalR-totalDSP
const [ano,mes]=chave.split("-")
lista.innerHTML+=`
<div style="margin-top:15px;background:#020617;padding:8px;border-radius:6px;border-left:4px solid #38bdf8;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
<div style="font-weight:bold">📅 ${formatarMesNome(mes)}/${ano}</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
<span style="color:#22c55e">💰 ${formatarMoeda(totalR)}</span>
<span style="color:#22c55e">✔ ${formatarMoeda(totalDPago)}</span>
<span style="color:#ef4444">⏳ ${formatarMoeda(totalDPendente)}</span>
<span style="color:#f59e0b">💸 ${formatarMoeda(totalDSP)}</span>
<span style="color:${saldo>=0?"#22c55e":"#ef4444"}">${saldo>=0?"📈":"📉"} ${formatarMoeda(saldo)}</span>
</div>
</div>
`
listaMes.forEach(x=>{
const ed=edicoesTemp[x.id]||{}
const dataVal=ed.data??x.data
const descVal=ed.descricao??x.descricao
const catVal=ed.categoria??x.categoria
const valVal=ed.valor??x.valor
const isReceita=x.tipo==="RECEITA"
lista.innerHTML+=`
<div style="display:grid;grid-template-columns:100px 1fr 120px 140px 200px;gap:6px;background:${isReceita?"#052e16":"#1e293b"};padding:4px;margin:2px 0;border-radius:6px;align-items:center;font-size:12px;border-left:3px solid ${isReceita?"#22c55e":"#ef4444"}">
<div>${modoEdicao?`<input type="date" value="${dataVal||""}" onchange="editTemp('${x.id}','data',this.value)">`:formatarDataBR(x.data)}</div>
<div>${modoEdicao?`<input type="text" value="${String(descVal||"").replace(/"/g,"&quot;")}" onchange="editTemp('${x.id}','descricao',this.value)">`:`${x.tipo==="RECEITA"?"+ ":"- "}${x.descricao||""}`}</div>
<div>${modoEdicao?`<select onchange="editTemp('${x.id}','categoria',this.value)"><option ${catVal==="GERAL"?"selected":""}>GERAL</option><option ${catVal==="CASA"?"selected":""}>CASA</option><option ${catVal==="SAÚDE"?"selected":""}>SAÚDE</option><option ${catVal==="EDUCAÇÃO"?"selected":""}>EDUCAÇÃO</option><option ${catVal==="LAZER"?"selected":""}>LAZER</option><option ${catVal==="TCERO/Cripto"?"selected":""}>TCERO/Cripto</option></select>`:(x.categoria||"")}</div>
<div style="text-align:right">${modoEdicao?`<input type="number" value="${valVal}" onchange="editTemp('${x.id}','valor',this.value)" style="width:90px">`:(x.tipo==="RECEITA"?(visibilidade[x.id]?"R$ "+formatarMoeda(x.valor):"R$ ***"):"R$ "+formatarMoeda(x.valor))}</div>

/* ====================================================022 – DASHBOARD==================================================== */
function atualizarDashboard(){
if(typeof Chart==="undefined")return
const elResumo=document.getElementById("graficoResumo")
const elMensal=document.getElementById("graficoMensal")
if(!elResumo||!elMensal)return
const ctxResumo=elResumo.getContext("2d")
const ctxMensal=elMensal.getContext("2d")
if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()
let listaFiltrada=[...dados]
const hoje=new Date()
const mesAtual=hoje.getMonth()
const anoAtual=hoje.getFullYear()
if(!modoAnoCompleto&&!filtroInicio&&!filtroFim){
listaFiltrada=listaFiltrada.filter(x=>{
if(!x.data)return false
const [ano,mes]=x.data.split("-")
return Number(mes)-1===mesAtual&&Number(ano)===anoAtual
})
}
if(filtroInicio)listaFiltrada=listaFiltrada.filter(x=>x.data>=filtroInicio)
if(filtroFim)listaFiltrada=listaFiltrada.filter(x=>x.data<=filtroFim)
let r=0,d=0,meses={}
listaFiltrada.forEach(x=>{
let m=getMesBase(x)
if(m===undefined)return
if(!meses[m])meses[m]={r:0,d:0}
if(x.tipo==="RECEITA"){r+=Number(x.valor||0);meses[m].r+=Number(x.valor||0)}else{d+=Number(x.valor||0);meses[m].d+=Number(x.valor||0)}
})
const gradReceita=ctxResumo.createLinearGradient(0,0,0,300)
gradReceita.addColorStop(0,"#22c55e")
gradReceita.addColorStop(1,"#14532d")
const gradDespesa=ctxResumo.createLinearGradient(0,0,0,300)
gradDespesa.addColorStop(0,"#ef4444")
gradDespesa.addColorStop(1,"#7f1d1d")
graficoResumo=new Chart(ctxResumo,{type:"doughnut",data:{labels:["Receitas","Despesas"],datasets:[{data:[r,d],backgroundColor:[gradReceita,gradDespesa],borderColor:"#111",borderWidth:2,hoverOffset:20}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{labels:{color:"#fff"}}}}})
graficoMensal=new Chart(ctxMensal,{type:"bar",data:{labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],datasets:[{label:"Receitas",data:Array.from({length:12},(_,i)=>meses[i]?.r||0)},{label:"Despesas",data:Array.from({length:12},(_,i)=>meses[i]?.d||0)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#fff"}}},scales:{x:{ticks:{color:"#fff"}},y:{ticks:{color:"#fff"}}}}})
}
/* ====================================================023 – COPIAR MÊS==================================================== */
async function copiarMesAnterior(){
const ano=new Date().getFullYear()
const mes=parseInt(document.getElementById("mesBase")?.value||new Date().getMonth()+1)-1
const mesAnterior=mes-1
if(mesAnterior<0){alert("Sem mês anterior");return}
const {data:anteriores}=await supabaseClient.from("lancamentos").select("*").gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`).lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)
const {data:atuais}=await supabaseClient.from("lancamentos").select("*").gte("data",`${ano}-${String(mes+1).padStart(2,"0")}-01`).lte("data",`${ano}-${String(mes+1).padStart(2,"0")}-31`)
const existentes=new Set((atuais||[]).map(x=>x.descricao))
for(const x of (anteriores||[])){
if(!existentes.has(x.descricao)){
const dia=x.data.split("-")[2]
await supabaseClient.from("lancamentos").insert({data:`${ano}-${String(mes+1).padStart(2,"0")}-${dia}`,descricao:x.descricao,tipo:x.tipo,categoria:x.categoria,valor:x.valor,pago:false})
}
}
alert("Mês criado com sucesso")
await carregar()
}

/* ====================================================033 – RECORRÊNCIA==================================================== */
async function gerarRecorrentes(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId)return
const {data:userData,error:userError}=await supabaseClient.auth.getUser()
if(userError||!userData.user){
console.error("Usuário não autenticado")
return
}
const user=userData.user
const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()+1
const primeiroDiaMes=`${ano}-${String(mes).padStart(2,"0")}-01`
const {data:rec,error}=await supabaseClient.from("lancamentos").select("*").eq("recorrente",true).eq("usuario_id",userId).lt("data",primeiroDiaMes).order("data",{ascending:true})
if(error){
console.error("Erro ao buscar recorrentes:",error)
return
}
const modelosMap=new Map()
for(const r of (rec||[])){
const dia=Number(r.dia_padrao||r.dia_vencimento||1)
const chaveModelo=[r.descricao||"",r.tipo||"",r.categoria||"",Number(r.valor||0),dia,String(r.user_id||"")].join("|")
if(!modelosMap.has(chaveModelo)){
modelosMap.set(chaveModelo,{descricao:r.descricao,tipo:r.tipo,categoria:r.categoria,valor:r.valor,dia_padrao:dia,user_id:r.user_id})
}
}
const modelos=[...modelosMap.values()]
for(const r of modelos){
const dia=Number(r.dia_padrao||1)
const nova=`${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`
const {data:existente,error:erroExistente}=await supabaseClient.from("lancamentos").select("id").eq("user_id",user.id).eq("data",nova).eq("descricao",r.descricao).eq("tipo",r.tipo).eq("categoria",r.categoria).eq("valor",r.valor).limit(1)
if(erroExistente){
console.error("Erro ao verificar duplicidade:",erroExistente)
continue
}
if(existente&&existente.length>0){
continue
}
const payload={data:nova,descricao:r.descricao,tipo:r.tipo,categoria:r.categoria,valor:r.valor,recorrente:true,dia_padrao:dia,pago:false,data_pagamento:null,dia_vencimento:dia,user_id:user.id}
const {error:insertError}=await supabaseClient.from("lancamentos").insert(payload)
if(insertError){
console.error("ERRO INSERT:",insertError,payload)
}
}
}

/* ====================================================036 – PARALLAX LOGIN==================================================== */
function iniciarParallaxLogin(){
const bg=document.getElementById("loginBg")
if(!bg)return
function mover(clientX,clientY){
if(!document.body.classList.contains("login"))return
const x=(clientX/window.innerWidth-.5)*24
const y=(clientY/window.innerHeight-.5)*24
bg.style.transform=`translate3d(${x}px,${y}px,0) scale(1.08)`
}
document.addEventListener("mousemove",e=>mover(e.clientX,e.clientY))
document.addEventListener("touchmove",e=>{
if(!e.touches||!e.touches[0])return
mover(e.touches[0].clientX,e.touches[0].clientY)
},{passive:true})
window.addEventListener("deviceorientation",e=>{
if(!document.body.classList.contains("login"))return
const gamma=typeof e.gamma==="number"?e.gamma:0
const beta=typeof e.beta==="number"?e.beta:0
const x=Math.max(-12,Math.min(12,gamma))*1.2
const y=Math.max(-12,Math.min(12,beta))*1.2
bg.style.transform=`translate3d(${x}px,${y}px,0) scale(1.08)`
})
}
</script>
<script>
document.addEventListener("DOMContentLoaded",async()=>{
await iniciarSistema()
iniciarParallaxLogin()
})
</script>

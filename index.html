/* ====================================================050 – GERAR DADOS BANCÁRIOS==================================================== */
function gerarDadosBancarios(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId)return

let agencia=localStorage.getItem("agencia_"+userId)
let conta=localStorage.getItem("conta_"+userId)

if(!agencia || !conta){

const hoje=new Date()

const dd=String(hoje.getDate()).padStart(2,"0")
const mm=String(hoje.getMonth()+1).padStart(2,"0")
const yyyy=hoje.getFullYear()

const dataBase=dd+mm+yyyy

/* 🔥 contador incremental */
let contador=parseInt(localStorage.getItem("contador_conta")||"1")

const contaGerada=String(contador).padStart(3,"0")+dataBase

agencia="1968-6"

localStorage.setItem("agencia_"+userId,agencia)
localStorage.setItem("conta_"+userId,contaGerada)

localStorage.setItem("contador_conta",contador+1)
}
}

dados=data||[]

const tipo=localStorage.getItem("tipo_usuario_lancamentos")
const userId=localStorage.getItem("usuario_id_lancamentos")

if(tipo!=="admin"){
dados=dados.filter(x=>String(x.usuario_id)===String(userId))
}

if(!window._renderLock){
window._renderLock=true
requestAnimationFrame(()=>{
render()
window._renderLock=false
})
}
}

/* ====================================================013 – NORMALIZAR DATA==================================================== */
function normalizarDataLocal(dataStr){
if(!dataStr)return null
const [ano,mes,dia]=dataStr.split("-")
return `${ano}-${mes}-${dia}`
}
/* ====================================================014 – FORMATADORES==================================================== */
function formatarMoeda(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})
}
function formatarDataBR(d){
if(!d)return""
/* 🔥 REMOVE QUALQUER COISA APÓS T (timezone) */
const limpa=d.split("T")[0]
const [ano,mes,dia]=limpa.split("-")
return `${dia}/${mes}/${ano}`
}
/* ====================================================015 – DATA LOCAL==================================================== */
function hojeLocal(){
const d=new Date()
const local=new Date(d.getTime()-d.getTimezoneOffset()*60000)
return local.toISOString().slice(0,10)
}
/* ====================================================016 – MÊS BASE==================================================== */
function getMesBase(x){
if(!x.data)return
const [ano,mes]=x.data.split("-")
return Number(mes)-1
}

/* ====================================================022 – DASHBOARD (NUBANK / CONTÁBIL)==================================================== */
function atualizarDashboard(){
/* ====================================================022.1 – BLOQUEIO DUPLO RENDER==================================================== */
if(window._chartLock)return
window._chartLock=true
/* ====================================================022.2 – VALIDAÇÃO CHART==================================================== */
if(typeof Chart==="undefined"){
window._chartLock=false
return
}
/* ====================================================022.3 – ELEMENTOS DOM==================================================== */
const elResumo=document.getElementById("graficoResumo")
const elMensal=document.getElementById("graficoMensal")
if(!elResumo||!elMensal){
window._chartLock=false
return
}
const ctxResumo=elResumo.getContext("2d")
const ctxMensal=elMensal.getContext("2d")
/* ====================================================022.4 – DESTRUIR CHARTS (SEGURO)==================================================== */
if(graficoResumo){
try{graficoResumo.destroy()}catch(e){}
graficoResumo=null
}
if(graficoMensal){
try{graficoMensal.destroy()}catch(e){}
graficoMensal=null
}
/* ====================================================022.5 – FILTRO DE DADOS==================================================== */
let listaFiltrada=[...dados]
if(filtroInicio)listaFiltrada=listaFiltrada.filter(x=>x.data>=filtroInicio)
if(filtroFim)listaFiltrada=listaFiltrada.filter(x=>x.data<=filtroFim)
/* ====================================================022.6 – CONSOLIDAÇÃO==================================================== */
let r=0
let d=0
let meses={}
listaFiltrada.forEach(x=>{
if(!x.data)return
const m=getMesBase(x)
if(m===undefined)return
if(!meses[m])meses[m]={r:0,d:0}
const v=Number(x.valor||0)
if(x.tipo==="RECEITA"){
r+=v
meses[m].r+=v
}else{
d+=v
meses[m].d+=v
}
})
/* ====================================================022.7 – GRÁFICO RESUMO (DOUGHNUT)==================================================== */
graficoResumo=new Chart(ctxResumo,{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[r,d],
backgroundColor:[
"rgba(34,197,94,0.9)",
"rgba(239,68,68,0.9)"
],
borderWidth:0
}]
},
options:{
cutout:"60%",
plugins:{
legend:{display:false},
tooltip:{
callbacks:{
label:(ctx)=>ctx.label+": R$ "+formatarMoeda(ctx.raw)
}
}
},
onClick:(evt,elements)=>{
if(elements.length){
const i=elements[0].index
const valor=i===0?r:d
const tipo=i===0?"Receitas":"Despesas"
alert(`${tipo}: R$ ${formatarMoeda(valor)}`)
}
}
}
})
/* ====================================================022.8 – GRÁFICO MENSAL (BARRAS)==================================================== */
graficoMensal=new Chart(ctxMensal,{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{
label:"Receitas",
data:Array.from({length:12},(_,i)=>meses[i]?.r||0),
backgroundColor:"rgba(34,197,94,0.7)",
borderRadius:6
},
{
label:"Despesas",
data:Array.from({length:12},(_,i)=>meses[i]?.d||0),
backgroundColor:"rgba(239,68,68,0.7)",
borderRadius:6
}
]
},
options:{
plugins:{
legend:{labels:{color:"#fff"}}
},
scales:{
x:{ticks:{color:"#fff"}},
y:{ticks:{color:"#fff"}}
}
}
})
/* ====================================================022.9 – LIBERAÇÃO LOCK==================================================== */
window._chartLock=false
}

/* ====================================================023 – COPIAR MÊS==================================================== */
async function copiarMesAnterior(){
const userId=localStorage.getItem("usuario_id_lancamentos")
if(!userId)return

const ano=new Date().getFullYear()
const mes=parseInt(document.getElementById("mesBase")?.value||new Date().getMonth()+1)-1
const mesAnterior=mes-1
if(mesAnterior<0){alert("Sem mês anterior");return}

const {data:anteriores}=await supabaseClient.from("lancamentos").select("*")
.eq("usuario_id",userId)
.gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)

const {data:atuais}=await supabaseClient.from("lancamentos").select("*")
.eq("usuario_id",userId)
.gte("data",`${ano}-${String(mes+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mes+1).padStart(2,"0")}-31`)

const existentes=new Set((atuais||[]).map(x=>x.descricao))

for(const x of (anteriores||[])){
if(!existentes.has(x.descricao)){
const dia=x.data.split("-")[2]
await supabaseClient.from("lancamentos").insert({
data:`${ano}-${String(mes+1).padStart(2,"0")}-${dia}`,
descricao:x.descricao,
tipo:x.tipo,
categoria:x.categoria,
valor:x.valor,
pago:false,
usuario_id:userId
})
}
}
alert("Mês criado com sucesso")
await carregar()
}

/* ====================================================033 – USER UI (PROFISSIONAL)==================================================== */
function setUserUI(){
const nome=localStorage.getItem("usuario_nome_lancamentos")||"Usuário"
const tipo=localStorage.getItem("tipo_usuario_lancamentos")||"user"
const plano=(localStorage.getItem("usuario_plano")||"free").toLowerCase()

const elNome=document.getElementById("userNome")
const elMeta=document.getElementById("userMeta")
const avatar=document.getElementById("userAvatar")

/* 🔥 PEGAR BOTÕES CORRETOS (SEM RISCO) */
const btnPro=document.getElementById("btnAssinarPro")
const btnPago=document.getElementById("btnJaPaguei")

if(!elNome||!elMeta||!avatar)return

elNome.innerText=nome

let badgePlano=""
let corPlano="#f59e0b"

/* 🔥 STATUS INTELIGENTE */
if(plano==="pro"){
badgePlano="🚀 PRO"
corPlano="#22c55e"
}else if(plano==="analise"){
badgePlano="⏳ EM ANÁLISE"
corPlano="#eab308"
}else{
badgePlano="💎 FREE"
corPlano="#f59e0b"
}

let badgeTipo=tipo==="admin"?"👑 ADMIN":"👤 USER"

elMeta.innerHTML=`<span style="color:${corPlano};font-weight:bold">${badgePlano}</span> • ${badgeTipo}`

avatar.innerText=nome.charAt(0).toUpperCase()
avatar.style.background=tipo==="admin"?"#f59e0b":corPlano

/* 🔥 CONTROLE DE BOTÕES */
if(btnPro && btnPago){

if(plano==="pro"){
btnPro.style.display="none"
btnPago.style.display="none"
}

else if(plano==="analise"){
btnPro.style.display="inline-block"
btnPro.innerText="⏳ Em análise"
btnPro.style.background="#eab308"
btnPro.style.color="#000"

btnPago.style.display="none"
}

else{
btnPro.style.display="inline-block"
btnPro.innerText="💰 Assinar PRO"
btnPro.style.background="linear-gradient(135deg,#22c55e,#16a34a)"
btnPro.style.color="#000"

btnPago.style.display="inline-block"
}

}
}

/* =========092 – FORMATAR INPUT VALOR=================================================== */
function formatarInputValor(el){
let v=el.value.replace(",",".")
let num=Number(v)
if(isNaN(num)){el.value="";return}
el.value=num.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})
}

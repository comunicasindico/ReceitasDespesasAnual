<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.edit{background:#3b82f6;color:#fff}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.resumo{margin-top:20px;padding:10px;background:#111827;border-radius:10px}
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center">
<h1>ReceitasDespesasAnual PRO</h1>
<button onclick="logout()" style="background:#ef4444;color:#fff">Sair</button>
</div>

<div class="topo">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">

<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>

<select id="categoria">
<option>GERAL</option>
<option>CASA</option>
<option>SAÚDE</option>
<option>EDUCAÇÃO</option>
<option>LAZER</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>
<label style="margin-left:10px">
<input type="checkbox" id="recorrente"> Recorrente
</label>

<input type="number" id="diaPadrao" placeholder="Dia" style="width:70px">
<textarea id="importarTexto" placeholder="Cole aqui suas despesas e receitas..." style="width:100%;height:120px;margin-top:10px"></textarea>
<button onclick="importarTexto()">Importar automático</button>
<button onclick="copiarMesAnterior()">Gerar base mês</button>
<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option>
<option value="2">Mar</option><option value="3">Abr</option>
<option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option>
<option value="8">Set</option><option value="9">Out</option>
<option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos Anos</option>
<option>2026</option>
<option>2027</option>
</select>

<select id="filtroTipo" onchange="render()">
<option value="">Todos</option>
<option>RECEITA</option>
<option>DESPESA</option>
</select>
</div>

<div class="resumo" id="resumo"></div>

<canvas id="graficoResumo"></canvas>
<canvas id="graficoMensal"></canvas>

<h2 id="total"></h2>
<button onclick="toggleValores()">👁 Mostrar/Ocultar valores</button>

<div style="display:grid;grid-template-columns:120px 1fr 120px 120px;gap:10px;font-weight:bold;margin-top:20px">
<div>Data</div>
<div>Descrição</div>
<div>Categoria</div>
<div>Valor</div>
</div>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* ====================================================
001 – CONFIG SUPABASE
==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* ====================================================
002 – ESTADO GLOBAL
==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let graficoResumo=null
let graficoMensal=null

/* ====================================================
003 – TOGGLE VALORES
==================================================== */
function toggleValores(){
mostrarValores=!mostrarValores
render()
}

/* ====================================================
004 – CARREGAR DADOS
==================================================== */
async function carregar(){

const{data,error}=await db.from("lancamentos").select("*").order("data",{ascending:true})
if(error)return alert("Erro ao carregar")

dados=data||[]

await gerarRecorrentes()

render()
}

/* ====================================================
005 – SALVAR
==================================================== */
async function salvarRegistro(obj){
if(obj.id){
await db.from("lancamentos").update(obj).eq("id",obj.id)
}else{
await db.from("lancamentos").insert(obj)
}
carregar()
}

/* ====================================================
006 – EXCLUIR
==================================================== */
async function del(id){
await db.from("lancamentos").delete().eq("id",id)
carregar()
}

/* ====================================================
007 – EDITAR
==================================================== */
function editar(x){
editando=x.id
data.value=x.data
desc.value=x.descricao
tipo.value=x.tipo
categoria.value=x.categoria
valor.value=x.valor
}

/* ====================================================
008 – ADICIONAR (INTELIGENTE - SEM DUPLICIDADE)
==================================================== */
async function add(){

/* 🔹 1 – CAPTURA CAMPOS */
const obj={
data:data.value,
descricao:desc.value,
tipo:tipo.value,
categoria:categoria.value,
valor:parseFloat(valor.value),
recorrente:document.getElementById("recorrente").checked,
dia_padrao:parseInt(document.getElementById("diaPadrao").value)||null
}

/* 🔹 2 – VALIDAÇÃO */
if(!obj.data || !obj.descricao){
alert("Preencha data e descrição")
return
}

/* 🔹 3 – VALOR ZERO NÃO ENTRA */
if(!obj.valor || obj.valor===0){
alert("Valor deve ser maior que zero")
return
}

/* 🔹 4 – EDIÇÃO NORMAL */
if(editando){
obj.id=editando
editando=null
await salvarRegistro(obj)
return
}

/* 🔹 5 – IDENTIFICA MÊS/ANO */
const mesAtual=obj.data.slice(0,7)

/* 🔹 6 – BUSCA EXISTENTE (MESMO MÊS + DESCRIÇÃO) */
const existente=dados.find(x=>
x.descricao.toLowerCase()===obj.descricao.toLowerCase() &&
x.data.slice(0,7)===mesAtual
)

/* 🔹 7 – SE EXISTE → ATUALIZA */
if(existente){
obj.id=existente.id
await salvarRegistro(obj)
alert("Registro atualizado")
return
}

/* 🔹 8 – SENÃO → INSERE */
await salvarRegistro(obj)
}

/* ====================================================
009 – IMPORTADOR
==================================================== */
async function importarTexto(){
const txt=importarTexto.value
if(!txt)return alert("Cole o texto")

const linhas=txt.split("\n")

for(const l of linhas){
const m=l.match(/(\d{2}\/\d{2})\s+(.+?)\s+([\d\.,]+)/)
if(!m)continue

let[dia,mes]=m[1].split("/")
let valor=parseFloat(m[3].replace(/\./g,"").replace(",","."))
let tipo=m[2].includes("REMUNERA")?"RECEITA":"DESPESA"

await db.from("lancamentos").insert({
data:`2026-${mes}-${dia}`,
descricao:m[2],
tipo:tipo,
categoria:"GERAL",
valor:valor
})
}

alert("Importado!")
carregar()
}

/* ====================================================
010 – RENDER
==================================================== */
function render(){
let total=0,receitas=0,despesas=0
dados=dados.filter(x=>x.valor!==0)
lista.innerHTML=""

dados.forEach(x=>{
if(x.tipo==="RECEITA"){total+=x.valor;receitas+=x.valor}
else{total-=x.valor;despesas+=x.valor}

lista.innerHTML+=`
<div style="display:grid;grid-template-columns:120px 1fr 120px 120px auto;gap:10px;background:#1e293b;padding:8px;margin:6px;border-radius:8px">
<div>${x.data}</div>
<div>${x.descricao}</div>
<div>${x.categoria}</div>
<div>${mostrarValores?"R$ "+x.valor.toFixed(2):"••••"}</div>
<div>
<button class="edit" onclick='editar(${JSON.stringify(x)})'>Editar</button>
<button class="delete" onclick="del('${x.id}')">Excluir</button>
</div>
</div>`
})

total.innerText="Saldo: "+(mostrarValores?"R$ "+total.toFixed(2):"••••")
resumo.innerText=`Receitas: R$ ${receitas.toFixed(2)} | Despesas: R$ ${despesas.toFixed(2)}`

atualizarDashboard()
}

/* ====================================================
011 – DASHBOARD
==================================================== */
function atualizarDashboard(){

if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0,meses={}

dados.forEach(x=>{
let m=new Date(x.data).getMonth()
if(!meses[m])meses[m]={r:0,d:0}
if(x.tipo==="RECEITA"){r+=x.valor;meses[m].r+=x.valor}
else{d+=x.valor;meses[m].d+=x.valor}
})

graficoResumo=new Chart(graficoResumo,{
type:"doughnut",
data:{labels:["Receitas","Despesas"],datasets:[{data:[r,d]}]}
})

graficoMensal=new Chart(graficoMensal,{
type:"bar",
data:{labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{label:"Receitas",data:Object.values(meses).map(x=>x.r)},
{label:"Despesas",data:Object.values(meses).map(x=>x.d)}
]}
})
}
/* ====================================================
012 – MÊS ANTERIOR
==================================================== */
async function copiarMesAnterior(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth() // atual
const mesAnterior=mes-1

// busca mês anterior
const {data:anteriores}=await db.from("lancamentos")
.select("*")
.gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)

// busca mês atual
const {data:atuais}=await db.from("lancamentos")
.select("*")
.gte("data",`${ano}-${String(mes+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mes+1).padStart(2,"0")}-31`)

// cria lista existente
let descricoesExistentes=new Set((atuais||[]).map(x=>x.descricao))

for(const x of (anteriores||[])){

if(!descricoesExistentes.has(x.descricao)){

await db.from("lancamentos").insert({
data:`${ano}-${String(mes+1).padStart(2,"0")}-01`,
descricao:x.descricao,
tipo:x.tipo,
categoria:x.categoria,
valor:0
})

}

}

alert("Base do mês criada")
carregar()

}
/* ====================================================
013 – LOGOUT
==================================================== */
function logout(){
localStorage.clear()
location.reload()
}

carregar()
/* ====================================================
014 – GERAR RECORRÊNCIA AUTOMÁTICA
==================================================== */
async function gerarRecorrentes(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()+1

/* 🔹 busca recorrentes */
const {data:recorrentes}=await db.from("lancamentos")
.select("*")
.eq("recorrente",true)

for(const r of (recorrentes||[])){

let dia=r.dia_padrao || 1

let novaData=`${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`

/* 🔹 verifica se já existe */
const jaExiste=dados.find(x=>
x.descricao===r.descricao &&
x.data===novaData
)

if(!jaExiste){

await db.from("lancamentos").insert({
data:novaData,
descricao:r.descricao,
tipo:r.tipo,
categoria:r.categoria,
valor:r.valor,
recorrente:true,
dia_padrao:dia
})

}

}

carregar()
}


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ReceitasDespesas PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#020617;color:#fff;padding:20px}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
#login{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
#app{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<div>
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">
<h2 id="user"></h2>
<button onclick="logout()" style="background:red;color:#fff">Sair</button>

<div>
<input id="data" type="date">
<input id="desc" placeholder="Descrição">
<select id="tipo">
<option>RECEITA</option>
<option>DESPESA</option>
</select>
<input id="valor" type="number">
<button onclick="add()">Adicionar</button>
</div>

<div id="lista"></div>

<canvas id="grafico" height="100"></canvas>
</div>

<script>

/* CONFIG */
const supabase = window.supabase.createClient(
"https://gspdlrenyrzbkxlvyugc.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
)

let dados=[]
let userId=null
let grafico=null

/* LOGIN */
async function login(){
const email=document.getElementById("email").value
const senha=document.getElementById("senha").value

const {data}=await supabase
.from("usuarios_lancamentos")
.select("*")
.eq("email",email)
.eq("senha",senha)
.single()

if(!data){alert("Login inválido");return}

userId=data.id

localStorage.setItem("user_id",userId)
localStorage.setItem("user_nome",data.nome)

abrirApp()
}

/* ABRIR APP */
async function abrirApp(){
userId=localStorage.getItem("user_id")
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("user").innerText=localStorage.getItem("user_nome")

await carregar()
}

/* LOGOUT */
function logout(){
localStorage.clear()
location.reload()
}

/* CARREGAR */
async function carregar(){
try{
const {data,error}=await supabase
.from("lancamentos")
.select("id,data,descricao,tipo,valor,user_id")
.order("data",{ascending:true})

if(error){
alert(error.message)
return
}

dados=(data||[]).filter(x=>String(x.user_id)===String(userId))

render()

}catch(e){
console.error(e)
alert("Erro ao carregar")
}
}

/* ADD */
async function add(){
const data=document.getElementById("data").value
const desc=document.getElementById("desc").value
const tipo=document.getElementById("tipo").value
const valor=parseFloat(document.getElementById("valor").value||0)

if(!data||!desc||!valor)return alert("Preencha tudo")

await supabase.from("lancamentos").insert({
data,
descricao:desc,
tipo,
valor,
user_id:userId
})

document.getElementById("desc").value=""
document.getElementById("valor").value=""

await carregar()
}

/* RENDER */
function render(){
const lista=document.getElementById("lista")

if(!dados.length){
lista.innerHTML="<p>Sem dados</p>"
return
}

let html=""
let r=0,d=0

dados.forEach(x=>{
if(x.tipo==="RECEITA")r+=Number(x.valor)
else d+=Number(x.valor)

html+=`
<div style="margin:4px;padding:6px;background:#111827;border-radius:6px">
${x.data} - ${x.descricao} - R$ ${x.valor}
</div>
`
})

lista.innerHTML=html

if(grafico)grafico.destroy()

grafico=new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Receita","Despesa"],
datasets:[{data:[r,d]}]
}
})
}

/* INIT */
window.onload=()=>{
const id=localStorage.getItem("user_id")
if(id){
abrirApp()
}
}

</script>
</body>
</html>

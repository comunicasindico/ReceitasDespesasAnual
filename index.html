<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.edit{background:#3b82f6;color:#fff}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.resumo{margin-top:20px;padding:10px;background:#111827;border-radius:10px}
<button onclick="limparFiltros()" style="margin-top:10px">🔍 Ver todos os períodos</button>

</style>
</head>
<body>
<div id="telaLogin" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:flex;align-items:center;justify-content:center;z-index:9999">
<div style="background:#111827;padding:30px;border-radius:10px;width:300px;display:flex;flex-direction:column;gap:10px">
<h2 style="text-align:center">Acesso</h2>
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="loginSistema()">Entrar</button>
</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center">
<h1>ReceitasDespesasAnual PRO</h1>
<button onclick="logout()" style="background:#ef4444;color:#fff">Sair</button>
</div>

<button onclick="toggleInsercao()" style="margin:10px 0">➕ Inserir / Ocultar</button>
<div id="boxInsercao" class="topo" style="display:none">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">

<select id="mesBase">
<option value="1">Jan</option><option value="2">Fev</option><option value="3">Mar</option>
<option value="4">Abr</option><option value="5">Mai</option><option value="6">Jun</option>
<option value="7">Jul</option><option value="8">Ago</option><option value="9">Set</option>
<option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
</select>

<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>

<select id="categoria">
<option>GERAL</option>
<option>CASA</option>
<option>SAÚDE</option>
<option>EDUCAÇÃO</option>
<option>LAZER</option>
</select>
<select id="filtroPago" onchange="render()">
<option value="">Todos</option>
<option value="false">Pendentes</option>
<option value="true">Pagos</option>
</select>
<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>

<label><input type="checkbox" id="recorrente"> Recorrente</label>
<input type="number" id="diaPadrao" placeholder="Dia" style="width:70px">

<textarea id="importarTexto" placeholder="Cole aqui..." style="width:100%;height:120px;margin-top:10px"></textarea>

<button onclick="importarTexto()">Importar automático</button>
<button onclick="copiarMesAnterior()">Gerar base mês</button>

<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option><option value="2">Mar</option>
<option value="3">Abr</option><option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option><option value="8">Set</option>
<option value="9">Out</option><option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos</option>
<option>2026</option>
<option>2027</option>
</select>

<select id="filtroTipo" onchange="render()">
<option value="">Todos</option>
<option>RECEITA</option>
<option>DESPESA</option>
</select>

</div>

<div id="resumo" class="resumo"></div>

<canvas id="graficoResumo" style="max-height:160px"></canvas>
<canvas id="graficoMensal" style="max-height:200px"></canvas>

<h2 id="total"></h2>
<button onclick="toggleValores()">👁 Mostrar/Ocultar valores</button>

<div style="display:grid;grid-template-columns:100px 1fr 120px 120px;gap:10px;margin-top:20px;font-weight:bold">
<div>Data</div><div>Descrição</div><div>Categoria</div><div>Valor</div>
</div>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* ====================================================000 – USUÁRIO FIXO==================================================== */
const USUARIO_FIXO="admin"
const SENHA_FIXA="123456"
/* ====================================================
001 – CONFIG
==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)
/* ====================================================001A – LOGIN SIMPLES 1 USUÁRIO==================================================== */
function loginSistema(){
const user=document.getElementById("loginUser").value.trim()
const pass=document.getElementById("loginPass").value.trim()
if(user===USUARIO_FIXO&&pass===SENHA_FIXA){
localStorage.setItem("logado","sim")
document.getElementById("telaLogin").style.display="none"
carregar()
}else{
alert("Login inválido")
}
}
function verificarSessao(){
const ok=localStorage.getItem("logado")
if(ok==="sim"){
document.getElementById("telaLogin").style.display="none"
carregar()
}else{
document.getElementById("telaLogin").style.display="flex"
}
}
function logout(){
localStorage.removeItem("logado")
location.reload()
}
/* ====================================================
002 – ESTADO
==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let visibilidade={}
let graficoResumo=null
let graficoMensal=null

/* ====================================================
003 – MÊS FINANCEIRO
==================================================== */
function getMesBase(x){
let mes=new Date(x.data).getMonth()
if(x.tipo==="RECEITA"){
mes++
if(mes>11)mes=0
}
return mes
}

/* ====================================================
004 – CARREGAR (PROTEGIDO)
==================================================== */
async function carregar(){

const {data,error}=await db
.from("lancamentos")
.select("*")
.order("data",{ascending:true})

if(error){
alert("Erro ao carregar")
return
}

dados=data||[]

render()
}

/* ====================================================
005 – SALVAR
==================================================== */
async function salvarRegistro(obj){

if(obj.id){
await db.from("lancamentos").update(obj).eq("id",obj.id)
}else{
await db.from("lancamentos").insert(obj)
}

await carregar()
}

/* ====================================================
006 – EXCLUIR
==================================================== */
async function del(id){
await db.from("lancamentos").delete().eq("id",id)
await carregar()
}

/* ====================================================
007 – MARCAR COMO PAGO (ÚNICA FUNÇÃO)
==================================================== */
async function marcarPago(id){

const item=dados.find(x=>String(x.id)===String(id))
if(!item)return

const novoStatus=!item.pago

await db.from("lancamentos")
.update({
pago:novoStatus,
data_pagamento:novoStatus ? new Date().toISOString().slice(0,10) : null
})
.eq("id",id)

await carregar()
}

/* ====================================================
008 – EDITAR
==================================================== */
function editarPorId(id){

const x=dados.find(d=>String(d.id)===String(id))
if(!x)return

editando=x.id

document.getElementById("data").value=x.data||""
document.getElementById("desc").value=x.descricao||""
document.getElementById("tipo").value=x.tipo||"DESPESA"
document.getElementById("categoria").value=x.categoria||"GERAL"
document.getElementById("valor").value=x.valor||0

}

/* ====================================================
009 – ADD (ROBUSTO)
==================================================== */
async function add(){

const dataEl=document.getElementById("data")
const descEl=document.getElementById("desc")
const tipoEl=document.getElementById("tipo")
const categoriaEl=document.getElementById("categoria")
const valorEl=document.getElementById("valor")
const recorrenteEl=document.getElementById("recorrente")
const diaEl=document.getElementById("diaPadrao")

const obj={
data:dataEl.value,
descricao:descEl.value.trim(),
tipo:tipoEl.value,
categoria:categoriaEl.value,
valor:parseFloat(valorEl.value||0),
recorrente:recorrenteEl?.checked||false,
dia_padrao:parseInt(diaEl?.value)||null,
dia_vencimento:new Date(dataEl.value).getDate(),
pago:false,
data_pagamento:null
}

if(!obj.data||!obj.descricao){
alert("Preencha data e descrição")
return
}

if(!obj.valor||obj.valor===0){
alert("Valor inválido")
return
}

if(editando){
obj.id=editando
editando=null
await salvarRegistro(obj)
return
}

await salvarRegistro(obj)
}

/* ====================================================
010 – IMPORTADOR (CORRIGIDO)
==================================================== */
async function importarTexto(){

const txt=document.getElementById("importarTexto").value
if(!txt)return

const linhas=txt.split("\n")

for(const l of linhas){

const m=l.match(/(\d{2}\/\d{2})\s+(.+?)\s+([\d\.,]+)/)
if(!m)continue

let[dia,mes]=m[1].split("/")
let valor=parseFloat(m[3].replace(/\./g,"").replace(",","."))
let tipo=m[2].toUpperCase().includes("REMUNERA")?"RECEITA":"DESPESA"

await db.from("lancamentos").insert({
data:`2026-${mes}-${dia}`,
descricao:m[2],
tipo,
categoria:"GERAL",
valor,
pago:false
})

}

await carregar()
}
/* ====================================================
010 – RENDER (CORRIGIDO PROFISSIONAL)
==================================================== */
function render(){

const lista=document.getElementById("lista")
const totalEl=document.getElementById("total")
const resumoEl=document.getElementById("resumo")

const filtroPago=document.getElementById("filtroPago")?.value
const fMes=document.getElementById("filtroMes")?.value
const fAno=document.getElementById("filtroAno")?.value
const fTipo=document.getElementById("filtroTipo")?.value

let listaFiltrada=[...dados]
const hoje=new Date()
const mesAtual=hoje.getMonth()
const anoAtual=hoje.getFullYear()
/* 🔹 PADRÃO: MÊS ATUAL */
if(!document.getElementById("filtroMes")?.value){
listaFiltrada=listaFiltrada.filter(x=>{
const d=new Date(x.data)
return d.getMonth()===mesAtual && d.getFullYear()===anoAtual
})
}
/* 🔹 FILTROS */
if(filtroPago!==""){
listaFiltrada=listaFiltrada.filter(x=>String(x.pago)===filtroPago)
}

if(fMes!==""){
listaFiltrada=listaFiltrada.filter(x=>getMesBase(x)==fMes)
}

if(fAno!==""){
listaFiltrada=listaFiltrada.filter(x=>new Date(x.data).getFullYear()==fAno)
}

if(fTipo!==""){
listaFiltrada=listaFiltrada.filter(x=>x.tipo===fTipo)
}

/* 🔹 ORDENAÇÃO */
listaFiltrada.sort((a,b)=>(a.dia_vencimento||0)-(b.dia_vencimento||0))

let saldo=0,r=0,d=0
lista.innerHTML=""

/* 🔹 LOOP */
listaFiltrada.forEach(x=>{

if(x.tipo==="RECEITA"){
saldo+=x.valor
r+=x.valor
}else{
saldo-=x.valor
d+=x.valor
}

lista.innerHTML+=`
<div onclick="marcarPago('${x.id}')" style="
display:grid;
grid-template-columns:70px 1fr 90px 140px auto;
gap:6px;
background:${x.pago ? "#052e16" : "#1e293b"};
padding:6px;
margin:3px 0;
border-radius:6px;
align-items:center;
border-left:3px solid ${x.pago ? "#22c55e" : (x.tipo==="RECEITA"?"#22c55e":"#ef4444")};
font-size:13px;
cursor:pointer;
transition:0.2s;
">

<div style="font-size:12px;color:#94a3b8">
${formatarDataBR(x.data)}
</div>

<div>${x.descricao}</div>

<div style="font-size:12px;color:#94a3b8">
${x.categoria}
</div>

<div style="display:flex;justify-content:flex-end;gap:6px">
<span style="min-width:90px;text-align:right">
${visibilidade[x.id]===false?"••••":"R$ "+formatarMoeda(x.valor)}
</span>
<button onclick="event.stopPropagation();toggleValor('${x.id}')">👁</button>
</div>

<div style="display:flex;gap:4px">
<button class="edit" onclick="event.stopPropagation();editarPorId('${x.id}')">✏️</button>
<button class="delete" onclick="event.stopPropagation();del('${x.id}')">🗑️</button>
</div>

</div>
`
})

/* 🔹 TOTAIS */
totalEl.innerText="Saldo: R$ "+formatarMoeda(saldo)
resumoEl.innerHTML=`
<div style="font-size:18px;font-weight:bold">
📊 Mês Atual
</div>
<div style="margin-top:5px">
💰 Receitas: R$ ${formatarMoeda(r)}
</div>
<div>
💸 Despesas: R$ ${formatarMoeda(d)}
</div>
`
atualizarDashboard()
}

/* ====================================================
011 – FORMATADORES
==================================================== */
function formatarMoeda(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function formatarDataBR(d){
if(!d)return ""
const x=new Date(d)
return x.toLocaleDateString("pt-BR")
}

/* ====================================================
012 – TOGGLE ITEM
==================================================== */
function toggleValor(id){
visibilidade[id]=!visibilidade[id]
render()
}

/* ====================================================
013 – DASHBOARD (CORRIGIDO)
==================================================== */
function atualizarDashboard(){

if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0,meses={}

dados.forEach(x=>{
let m=getMesBase(x)

if(!meses[m])meses[m]={r:0,d:0}

if(x.tipo==="RECEITA"){
r+=x.valor
meses[m].r+=x.valor
}else{
d+=x.valor
meses[m].d+=x.valor
}
})

/* 🔹 RESUMO */
graficoResumo=new Chart(
document.getElementById("graficoResumo"),
{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[r,d],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
)

/* 🔹 MENSAL */
graficoMensal=new Chart(
document.getElementById("graficoMensal"),
{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{
label:"Receitas",
data:Array.from({length:12},(_,i)=>meses[i]?.r||0),
backgroundColor:"#22c55e"
},
{
label:"Despesas",
data:Array.from({length:12},(_,i)=>meses[i]?.d||0),
backgroundColor:"#ef4444"
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
)

}

/* ====================================================
014 – COPIAR MÊS (SEM DUPLICAR)
==================================================== */
async function copiarMesAnterior(){

const ano=new Date().getFullYear()
const mes=parseInt(document.getElementById("mesBase").value)-1
const mesAnterior=mes-1

if(mesAnterior<0){
alert("Sem mês anterior")
return
}

/* 🔹 BUSCA */
const {data:anteriores}=await db.from("lancamentos").select("*")
.gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)

/* 🔹 EXISTENTES */
const {data:atuais}=await db.from("lancamentos").select("*")
.gte("data",`${ano}-${String(mes+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mes+1).padStart(2,"0")}-31`)

const existentes=new Set((atuais||[]).map(x=>x.descricao))

for(const x of (anteriores||[])){

if(!existentes.has(x.descricao)){

await db.from("lancamentos").insert({
data:`${ano}-${String(mes+1).padStart(2,"0")}-${String(new Date(x.data).getDate()).padStart(2,"0")}`,
descricao:x.descricao,
tipo:x.tipo,
categoria:x.categoria,
valor:x.valor,
pago:false
})

}

}

alert("Mês criado com sucesso")
await carregar()
}
/* ====================================================
015 – RECORRÊNCIA (ANTI-DUPLICAÇÃO PROFISSIONAL)
==================================================== */
async function gerarRecorrentes(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()+1

const {data:rec,error}=await db
.from("lancamentos")
.select("*")
.eq("recorrente",true)

if(error)return

for(const r of (rec||[])){

let dia=r.dia_padrao||1

let novaData=`${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`

/* 🔹 VERIFICA EXISTÊNCIA COMPLETA */
const existe=dados.find(x=>
x.descricao===r.descricao &&
x.tipo===r.tipo &&
x.categoria===r.categoria &&
x.data===novaData
)

if(!existe){

await db.from("lancamentos").insert({
data:novaData,
descricao:r.descricao,
tipo:r.tipo,
categoria:r.categoria,
valor:r.valor,
recorrente:true,
dia_padrao:dia,
pago:false,
data_pagamento:null,
dia_vencimento:dia
})

}

}

}

/* ====================================================
016 – TOGGLE GLOBAL
==================================================== */
function toggleValores(){
mostrarValores=!mostrarValores
render()
}

/* ====================================================017 – LOGOUT (SIMPLES 1 USUÁRIO)==================================================== */
function logout(){
localStorage.removeItem("logado")
location.reload()
}
/* ====================================================
018 – START SISTEMA
==================================================== */
async function iniciarSistema(){
await verificarSessao()   // 🔥 garante login
await gerarRecorrentes()  // 🔥 gera automáticos
}
/* ====================================================019 – TOGGLE INSERÇÃO==================================================== */
function toggleInsercao(){
const el=document.getElementById("boxInsercao")
if(!el)return
el.style.display=el.style.display==="none"?"flex":"none"
}
/* ====================================================020 – LIMPAR FILTROS==================================================== */
function limparFiltros(){
document.getElementById("filtroMes").value=""
document.getElementById("filtroAno").value=""
render()
}
/* 🔥 INICIALIZAÇÃO */
document.addEventListener("DOMContentLoaded", iniciarSistema)

</script>

</body>
</html>

/* ====================================================030 – INSERIR LANÇAMENTO==================================================== */
async function inserirLancamento(){

if(!podeAdicionar())return

const tipo=safe("tipoNovo").value
const categoria=safe("categoriaNova").value
const desc=safe("descNovo").value
const valor=parseFloat(safe("valorNovo").value||0)

if(!desc||!valor){

}

await db.from("lancamentos").insert({
data:new Date().toISOString().slice(0,10),
descricao:categoria+" - "+desc,
valor:valor,
tipo:tipo,
usuario_id:localStorage.getItem("usuario_id_lancamentos")
})

carregar()
}

/* ====================================================032 – ATUALIZAR BOTÃO EDIÇÃO==================================================== */
function toggleEdicao(){
modoEdicao=!modoEdicao
safe("txtEdicao").innerText=modoEdicao?"✔️ Salvar":"✏️ Editar"
render()
}
/* ====================================================================================================== */
usuario.plano = localStorage.getItem("usuario_plano") || usuario.plano || "free"
usuario.plano_expira_em = localStorage.getItem("plano_expira_em") || usuario.plano_expira_em || null
/* ====================================================033 – RENDER PROFISSIONAL==================================================== */
function render(){
const hoje=new Date()
const expira=usuario.plano_expira_em?new Date(usuario.plano_expira_em):null
const bloqueado = (usuario.plano!=="pro" || (expira && expira<hoje))
try{
const tela=safe("telaExtrato")
if(!tela||!tela.classList.contains("telaAtiva"))return

const lista=safe("lista")
const resumo=safe("resumo")

if(!dados||!dados.length){
lista.innerHTML="<div class='card'>Sem registros</div>"
resumo.innerHTML=""
return
}

/* 🔥 AGRUPAMENTO */
const grupos={}
dados.forEach(x=>{
if(!x.data)return
const d=x.data.split("T")[0]
const [ano,mes]=d.split("-")
const chave=ano+"-"+mes
if(!grupos[chave])grupos[chave]=[]
grupos[chave].push(x)
})

const chaves=Object.keys(grupos).sort().reverse()

let html=""
let totalR=0
let totalD=0

chaves.forEach(chave=>{

const listaMes=grupos[chave]

listaMes.sort((a,b)=>(a.data||"").localeCompare(b.data||""))

let r=0,d=0

listaMes.forEach(x=>{
const v=Number(x.valor||0)
if(x.tipo==="RECEITA")r+=v
else d+=v
})

totalR+=r
totalD+=d

const saldo=r-d
const [ano,mes]=chave.split("-")

/* ====================================================HEADER==================================================== */
html+=`
<div class="card" onclick="toggleMes('${chave}')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">

<div style="font-weight:bold">${mes}/${ano}</div>

<div style="display:flex;align-items:center;gap:8px">

<b style="color:${saldo>=0?"#16a34a":"#dc2626"}">
${bloqueado?"🔒":(ocultarSaldo?"R$ ***":formatarMoeda(saldo))}
</b>

<button onclick="event.stopPropagation();toggleSaldo()" style="background:#e2e8f0;padding:6px;border-radius:8px">👁</button>

</div>
</div>
`

/* ====================================================ITENS==================================================== */
if(!mesesOcultos[chave]){

listaMes.forEach(x=>{

const valor=Number(x.valor||0)
const vis=visibilidade[x.id]===false

html+=`
<div class="card" style="padding:8px;display:flex;justify-content:space-between;align-items:center">

<div style="flex:2;font-size:13px">

${modoEdicao
? `<input value="${x.descricao||""}" onchange="editarCampo('${x.id}','descricao',this.value)">`
: `${formatarDataBR(x.data)} - ${x.descricao}`
}

</div>

<div style="flex:1;text-align:right;font-weight:bold;color:${x.tipo==="RECEITA"?"#16a34a":"#dc2626"}">

${modoEdicao
? `<input value="${valor}" type="number" onchange="editarCampo('${x.id}','valor',this.value)" style="width:90px;text-align:right">`
: (bloqueado
    ? "🔒"
    : (x.tipo==="RECEITA"
        ? "R$ ***"
        : (vis ? "R$ ***" : formatarMoeda(valor))
      )
  )
}

</div>

<div style="display:flex;gap:4px">

<button onclick="event.stopPropagation();toggleValor('${x.id}')">👁</button>

${modoEdicao?`
<button onclick="event.stopPropagation();excluirLancamento('${x.id}')" style="background:#ef4444;color:#fff">🗑</button>
`:""}

</div>

</div>
`
})

}

})

lista.innerHTML=html

/* ====================================================TOTAL==================================================== */
const saldoTotal=totalR-totalD

resumo.innerHTML=`
<div class="card" style="display:flex;justify-content:space-between;align-items:center">

<b>Total Geral</b>

<div style="display:flex;align-items:center;gap:8px">

<b style="color:${saldoTotal>=0?"#16a34a":"#dc2626"}">
${ocultarSaldo?"R$ ***":formatarMoeda(saldoTotal)}
</b>

<button onclick="toggleSaldo()">👁</button>

</div>
</div>
`

}catch(e){
console.error("ERRO RENDER:",e)
}
}

/* 🔥 CATEGORIAS */
const mapa=resumoCategorias()

/* ====================================================040 – LOGIN SaaS==================================================== */
async function loginSistema(){

const email=safe("loginUser").value.trim()
const senha=safe("loginPass").value.trim()

if(!email||!senha){
alert("Preencha os dados")
return
}

const {data,error}=await db
.from("usuarios_lancamentos")
.select("*")
.eq("email",email)
.eq("senha",senha)
.maybeSingle()

if(error){
console.error(error)
alert("Erro no login")
return
}

if(!data){
alert("Login inválido")
return
}

/* 🔒 BLOQUEIO POR APROVAÇÃO */
if(data.status!=="aprovado"){
alert("⏳ Conta aguardando aprovação do administrador")
return
}

localStorage.clear()

localStorage.setItem("usuario_nome_lancamentos",data.nome)

/* ====================================================043 – DASHBOARD BANCO==================================================== */
function atualizarDashboardBanco(){

let r=0,d=0

dados.forEach(x=>{

else d+=Number(x.valor||0)
})

const saldo=r-d

safe("dashReceitas").innerText=ocultarSaldo?"R$ ***":formatarMoeda(r)
safe("dashDespesas").innerText=ocultarSaldo?"R$ ***":formatarMoeda(d)
safe("dashSaldo").innerText=ocultarSaldo?"R$ ***":formatarMoeda(saldo)
}

async function carregarPerfil(){

const id=localStorage.getItem("usuario_id_lancamentos")
if(!id)return

const {data,error}=await db
.from("usuarios_lancamentos")
.select("*")
.eq("id",id)
.maybeSingle()

return
}

usuario=data

safe("mobileNome").innerText=data.nome||""
safe("mobileAgencia").innerText=data.agencia||"--"
safe("mobileConta").innerText=data.conta||"--"

safe("perfilNome").value=data.nome||""
safe("perfilEmail").value=data.email||""
safe("perfilCelular").value=data.celular||""

safe("boxAgencia").innerText=data.agencia||"--"
safe("boxConta").innerText=data.conta||"--"

safe("badgePlano").innerText="Plano: "+(data.plano||"FREE")

}
  
/* 🔹 CARREGAR DADOS */
async function carregar(){
const usuario_id=localStorage.getItem("usuario_id_lancamentos")
if(!usuario_id)return
const {data,error}=await db
.from("lancamentos")
.select("*")
.eq("usuario_id",usuario_id)
.order("data",{ascending:false})
if(error){
console.error(error)
return
}
window.dados=data||[]
render()

if(!window._initUI){
window._initUI=true
atualizarTudo()
}
}

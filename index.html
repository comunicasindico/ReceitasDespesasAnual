/* ====================================================022 – DASHBOARD==================================================== */
function atualizarDashboard(){
if(typeof Chart==="undefined")return

const elResumo=document.getElementById("graficoResumo")
const elMensal=document.getElementById("graficoMensal")

if(!elResumo||!elMensal)return

const ctxResumo=elResumo.getContext("2d")
const ctxMensal=elMensal.getContext("2d")

if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0
let meses={}

dados.forEach(x=>{
if(!x.data)return
const m=getMesBase(x)
if(m===undefined)return

if(!meses[m])meses[m]={r:0,d:0}

const v=Number(x.valor||0)

if(x.tipo==="RECEITA"){
r+=v
meses[m].r+=v
}else{
d+=v
meses[m].d+=v
}
})

graficoResumo=new Chart(ctxResumo,{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{data:[r,d]}]
},
options:{plugins:{legend:{labels:{color:"#fff"}}}}
})

graficoMensal=new Chart(ctxMensal,{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{label:"Receitas",data:Array.from({length:12},(_,i)=>meses[i]?.r||0)},
{label:"Despesas",data:Array.from({length:12},(_,i)=>meses[i]?.d||0)}
]
},
options:{plugins:{legend:{labels:{color:"#fff"}}}}
})
}

async function copiarMesAnterior(){

/* ====================================================040 – PIX COMPLETO PADRÃO BANCO==================================================== */
function gerarPix(){

const usuario_id=localStorage.getItem("usuario_id_lancamentos")||"000"
const nome=localStorage.getItem("usuario_nome_lancamentos")||"Cliente"

/* 🔑 SUA CHAVE PIX */
const chavePIX="69984311978"

/* 💰 VALOR */
const valor="19.90"

/* 🧾 IDENTIFICADOR */
const txid="USER"+usuario_id

/* 🏦 GERAR PIX PADRÃO */
const payload =
"000201"+
"26"+"54"+
"0014br.gov.bcb.pix"+
"01"+String(chavePIX.length).padStart(2,"0")+chavePIX+
"52040000"+
"5303986"+
"54"+String(valor.length).padStart(2,"0")+valor+
"5802BR"+
"59"+"13"+"MANOEL F NETO"+
"60"+"08"+"Brasil - SC"+
"62"+"05"+
"05"+String(txid.length).padStart(2,"0")+txid+
"6304"
/* 🔢 CRC16 */
function crc16(str){
let crc=0xFFFF
for(let c=0;c<str.length;c++){
crc^=str.charCodeAt(c)<<8
for(let i=0;i<8;i++){
if(crc&0x8000){crc=(crc<<1)^0x1021}else{crc<<=1}
}
}
return (crc&0xFFFF).toString(16).toUpperCase().padStart(4,"0")
}

const pixFinal=payload+crc16(payload)
/* 📷 QR CODE */
const img=document.getElementById("qrPix")
img.src=`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(pixFinal)}`
/* 🔑 MOSTRAR COPIA E COLA */
const inputPix=document.getElementById("chavePix")
if(inputPix){
inputPix.value=pixFinal
}
/* 📧 EMAIL AUTOMÁTICO */
window.location.href=`mailto:phdbr68@gmail.com?subject=Pagamento PIX PRO&body=Usuário: ${nome}%0AID: ${usuario_id}%0AValor: R$19,90%0ATXID: ${txid}%0A%0AEnviei o comprovante.`

document.getElementById("boxPix").style.display="block"
}

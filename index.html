<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.edit{background:#3b82f6;color:#fff}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.resumo{margin-top:20px;padding:10px;background:#111827;border-radius:10px}
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center">
<h1>ReceitasDespesasAnual PRO</h1>
<button onclick="logout()" style="background:#ef4444;color:#fff">Sair</button>
</div>

<div class="topo">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">

<select id="mesBase">
<option value="1">Jan</option><option value="2">Fev</option><option value="3">Mar</option>
<option value="4">Abr</option><option value="5">Mai</option><option value="6">Jun</option>
<option value="7">Jul</option><option value="8">Ago</option><option value="9">Set</option>
<option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
</select>

<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>

<select id="categoria">
<option>GERAL</option>
<option>CASA</option>
<option>SAÚDE</option>
<option>EDUCAÇÃO</option>
<option>LAZER</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>

<label><input type="checkbox" id="recorrente"> Recorrente</label>
<input type="number" id="diaPadrao" placeholder="Dia" style="width:70px">

<textarea id="importarTexto" placeholder="Cole aqui..." style="width:100%;height:120px;margin-top:10px"></textarea>

<button onclick="importarTexto()">Importar automático</button>
<button onclick="copiarMesAnterior()">Gerar base mês</button>

<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option><option value="2">Mar</option>
<option value="3">Abr</option><option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option><option value="8">Set</option>
<option value="9">Out</option><option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos</option>
<option>2026</option>
<option>2027</option>
</select>

<select id="filtroTipo" onchange="render()">
<option value="">Todos</option>
<option>RECEITA</option>
<option>DESPESA</option>
</select>

</div>

<div id="resumo" class="resumo"></div>

<canvas id="graficoResumo" style="max-height:160px"></canvas>
<canvas id="graficoMensal" style="max-height:200px"></canvas>

<h2 id="total"></h2>
<button onclick="toggleValores()">👁 Mostrar/Ocultar valores</button>

<div style="display:grid;grid-template-columns:100px 1fr 120px 120px;gap:10px;margin-top:20px;font-weight:bold">
<div>Data</div><div>Descrição</div><div>Categoria</div><div>Valor</div>
</div>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* ====================================================
001 – CONFIG
==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* ====================================================
002 – ESTADO
==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let visibilidade={}
let graficoResumo=null
let graficoMensal=null

/* ====================================================
003 – MÊS FINANCEIRO
==================================================== */
function getMesBase(x){
let mes=new Date(x.data).getMonth()
if(x.tipo==="RECEITA"){mes++;if(mes>11)mes=0}
return mes
}

/* ====================================================
004 – CARREGAR
==================================================== */
async function carregar(){
const{data,error}=await db.from("lancamentos").select("*").order("data",{ascending:true})
if(error)return alert("Erro")
dados=data||[]
await gerarRecorrentes()
render()
}

/* ====================================================
005 – SALVAR
==================================================== */
async function salvarRegistro(obj){
if(obj.id)await db.from("lancamentos").update(obj).eq("id",obj.id)
else await db.from("lancamentos").insert(obj)
carregar()
}

/* ====================================================
006 – EXCLUIR
==================================================== */
async function del(id){
await db.from("lancamentos").delete().eq("id",id)
carregar()
}

/* ====================================================
007 – EDITAR
==================================================== */
function editarPorId(id){
const x=dados.find(d=>String(d.id)===String(id))
if(!x)return
editando=x.id
data.value=x.data
desc.value=x.descricao
tipo.value=x.tipo
categoria.value=x.categoria
valor.value=x.valor
}

/* ====================================================
008 – ADD
==================================================== */
async function add(){
const obj={
data:data.value,
descricao:desc.value.trim(),
tipo:tipo.value,
categoria:categoria.value,
valor:parseFloat(valor.value),
recorrente:recorrente.checked,
dia_padrao:parseInt(diaPadrao.value)||null
}
if(!obj.data||!obj.descricao)return alert("Preencha")
if(!obj.valor||obj.valor===0)return alert("Valor inválido")
if(editando){obj.id=editando;editando=null;await salvarRegistro(obj);return}
await salvarRegistro(obj)
}

/* ====================================================
009 – IMPORTADOR
==================================================== */
async function importarTexto(){
const txt=importarTexto.value
if(!txt)return
const linhas=txt.split("\n")
for(const l of linhas){
const m=l.match(/(\d{2}\/\d{2})\s+(.+?)\s+([\d\.,]+)/)
if(!m)continue
let[dia,mes]=m[1].split("/")
let valor=parseFloat(m[3].replace(/\./g,"").replace(",","."))
let tipo=m[2].toUpperCase().includes("REMUNERA")?"RECEITA":"DESPESA"
await db.from("lancamentos").insert({
data:`2026-${mes}-${dia}`,
descricao:m[2],
tipo,categoria:"GERAL",valor
})
}
carregar()
}

/* ====================================================
010 – RENDER
==================================================== */
function render(){

const fMes=filtroMes.value
const fAno=filtroAno.value
const fTipo=filtroTipo.value

let listaFiltrada=[...dados]

if(fMes!=="")listaFiltrada=listaFiltrada.filter(x=>getMesBase(x)==fMes)
if(fAno!=="")listaFiltrada=listaFiltrada.filter(x=>new Date(x.data).getFullYear()==fAno)
if(fTipo!=="")listaFiltrada=listaFiltrada.filter(x=>x.tipo===fTipo)

let saldo=0,r=0,d=0
lista.innerHTML=""

listaFiltrada.forEach(x=>{
if(x.tipo==="RECEITA"){saldo+=x.valor;r+=x.valor}else{saldo-=x.valor;d+=x.valor}

lista.innerHTML+=`
<div style="display:grid;grid-template-columns:90px 1fr 100px 140px auto;gap:6px;background:#1e293b;padding:6px;margin:3px;border-radius:6px;border-left:3px solid ${x.tipo==="RECEITA"?"#22c55e":"#ef4444"}">

<div style="font-size:12px">${formatarDataBR(x.data)}</div>
<div>${x.descricao}</div>
<div style="font-size:12px">${x.categoria}</div>

<div style="display:flex;justify-content:flex-end;gap:6px">
<span style="min-width:100px;text-align:right">
${visibilidade[x.id]===false?"••••":"R$ "+formatarMoeda(x.valor)}
</span>
<button onclick="toggleValor('${x.id}')">👁</button>
</div>

<div style="display:flex;gap:4px">
<button class="edit" onclick="editarPorId('${x.id}')">✏️</button>
<button class="delete" onclick="del('${x.id}')">🗑️</button>
</div>

</div>`
})

total.innerText="Saldo: R$ "+formatarMoeda(saldo)
resumo.innerText=`Receitas: R$ ${formatarMoeda(r)} | Despesas: R$ ${formatarMoeda(d)}`

atualizarDashboard()
}

/* ====================================================
011 – FORMATADORES
==================================================== */
function formatarMoeda(v){return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})}
function formatarDataBR(d){const x=new Date(d);return x.toLocaleDateString("pt-BR")}

/* ====================================================
012 – TOGGLE ITEM
==================================================== */
function toggleValor(id){visibilidade[id]=!visibilidade[id];render()}

/* ====================================================
013 – DASHBOARD
==================================================== */
function atualizarDashboard(){

if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0,meses={}

dados.forEach(x=>{
let m=getMesBase(x)
if(!meses[m])meses[m]={r:0,d:0}
if(x.tipo==="RECEITA"){r+=x.valor;meses[m].r+=x.valor}else{d+=x.valor;meses[m].d+=x.valor}
})

graficoResumo=new Chart(graficoResumo=document.getElementById("graficoResumo"),{
type:"doughnut",
data:{labels:["Receitas","Despesas"],datasets:[{data:[r,d],backgroundColor:["#22c55e","#ef4444"]}]}
})

graficoMensal=new Chart(document.getElementById("graficoMensal"),{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{label:"Receitas",data:Array.from({length:12},(_,i)=>meses[i]?.r||0),backgroundColor:"#22c55e"},
{label:"Despesas",data:Array.from({length:12},(_,i)=>meses[i]?.d||0),backgroundColor:"#ef4444"}
]
}
})

}

/* ====================================================
014 – COPIAR MÊS
==================================================== */
async function copiarMesAnterior(){
const ano=new Date().getFullYear()
const mes=parseInt(mesBase.value)-1
const mesAnterior=mes-1
if(mesAnterior<0)return alert("Sem mês anterior")

const {data:anteriores}=await db.from("lancamentos").select("*")
.gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)

for(const x of (anteriores||[])){
await db.from("lancamentos").insert({
data:`${ano}-${String(mes+1).padStart(2,"0")}-${String(new Date(x.data).getDate()).padStart(2,"0")}`,
descricao:x.descricao,
tipo:x.tipo,
categoria:x.categoria,
valor:x.valor
})
}

carregar()
}

/* ====================================================
015 – RECORRÊNCIA
==================================================== */
async function gerarRecorrentes(){
const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()+1
const {data:rec}=await db.from("lancamentos").select("*").eq("recorrente",true)

for(const r of (rec||[])){
let dia=r.dia_padrao||1
let nova=`${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`
const existe=dados.find(x=>x.descricao===r.descricao && x.data===nova)
if(!existe){
await db.from("lancamentos").insert({
data:nova,descricao:r.descricao,tipo:r.tipo,categoria:r.categoria,valor:r.valor,recorrente:true,dia_padrao:dia
})
}
}
}

/* ====================================================
016 – TOGGLE GLOBAL
==================================================== */
function toggleValores(){mostrarValores=!mostrarValores;render()}

/* ====================================================
017 – LOGOUT
==================================================== */
function logout(){localStorage.clear();location.reload()}

carregar()

</script>

</body>
</html>

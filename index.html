<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.edit{background:#3b82f6;color:#fff}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.resumo{margin-top:20px;padding:10px;background:#111827;border-radius:10px}
</style>
</head>
<body>

<h1>ReceitasDespesasAnual PRO</h1>

<div class="topo">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">

<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>
<select id="categoria">
<option>GERAL</option>
<option>CASA</option>
<option>SAÚDE</option>
<option>EDUCAÇÃO</option>
<option>LAZER</option>
</select>
<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>
<textarea id="importarTexto" placeholder="Cole aqui suas despesas e receitas..." style="width:100%;height:120px;margin-top:10px"></textarea>
<button onclick="importarTexto()">Importar automático</button>
  
<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option>
<option value="2">Mar</option><option value="3">Abr</option>
<option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option>
<option value="8">Set</option><option value="9">Out</option>
<option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos Anos</option>
<option>2026</option>
<option>2027</option>
</select>

<select id="filtroTipo" onchange="render()">
<option value="">Todos</option>
<option>RECEITA</option>
<option>DESPESA</option>
</select>

<button onclick="exportar()">Backup</button>
<input type="file" onchange="importar(event)">
</div>

<div class="resumo" id="resumo"></div>
<canvas id="graficoResumo" style="margin-top:20px"></canvas>
<canvas id="graficoMensal" style="margin-top:20px"></canvas>
<h2 id="total"></h2>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let dados=[]
let editando=null

async function carregar(){
const{data,error}=await db.from("lancamentos").select("*").order("data",{ascending:true})
if(error){alert("Erro ao carregar");console.log(error);return}
dados=data||[]
render()
}

async function salvarRegistro(obj){
if(obj.id){
await db.from("lancamentos").update(obj).eq("id",obj.id)
}else{
await db.from("lancamentos").insert(obj)
}
carregar()
}

async function del(id){
await db.from("lancamentos").delete().eq("id",id)
carregar()
}

function editar(x){
editando=x.id
document.getElementById("data").value=x.data
document.getElementById("desc").value=x.descricao
document.getElementById("tipo").value=x.tipo
document.getElementById("categoria").value=x.categoria
document.getElementById("valor").value=x.valor
}

async function add(){
const obj={
data:document.getElementById("data").value,
descricao:document.getElementById("desc").value,
tipo:document.getElementById("tipo").value,
categoria:document.getElementById("categoria").value,
valor:parseFloat(document.getElementById("valor").value)
}

if(!obj.data||!obj.descricao||!obj.valor)return alert("Preencha tudo")

if(editando){obj.id=editando;editando=null}

await salvarRegistro(obj)
}

function render(){
const lista=document.getElementById("lista")
lista.innerHTML=""

let total=0,receitas=0,despesas=0

dados.forEach(x=>{
if(x.tipo==="RECEITA"){total+=x.valor;receitas+=x.valor}
else{total-=x.valor;despesas+=x.valor}

lista.innerHTML+=`
<div class="card">
${x.data} - ${x.descricao} - ${x.categoria} - R$ ${Number(x.valor).toFixed(2)}
<button class="edit" onclick='editar(${JSON.stringify(x)})'>Editar</button>
<button class="delete" onclick="del("${x.id}")">Excluir</button>
</div>
`
})

document.getElementById("total").innerText="Saldo: R$ "+total.toFixed(2)
document.getElementById("resumo").innerHTML=
"Receitas: R$ "+receitas.toFixed(2)+" | Despesas: R$ "+despesas.toFixed(2)
}

carregar()
atualizarDashboard()

function importarTexto(){
const txt=document.getElementById("importarTexto").value
if(!txt)return alert("Cole o texto")

const linhas=txt.split("\n")
let registros=[]

linhas.forEach(l=>{
l=l.trim()
if(!l)return

// padrão: 01/03 NOME 123,45
const match=l.match(/(\d{2}\/\d{2})\s+(.+?)\s+([\d\.,]+)/)

if(match){
let data=match[1]
let desc=match[2]
let valor=match[3]

// transforma data
let[dia,mes]=data.split("/")
let dataFinal=`2026-${mes}-${dia}`

// valor
valor=parseFloat(valor.replace(/\./g,"").replace(",","."))
if(!valor)return

// tipo automático
let tipo=desc.toUpperCase().includes("REMUNERA")?"RECEITA":"DESPESA"

registros.push({
data:dataFinal,
descricao:desc,
tipo:tipo,
categoria:"GERAL",
valor:valor
})
}
})

// envia pro banco
registros.forEach(async r=>{
await db.from("lancamentos").insert(r)
})

alert("Importado: "+registros.length+" registros")
carregar()
}

let graficoResumo=null
let graficoMensal=null

function atualizarDashboard(){

let receitas=0
let despesas=0
let meses={}

dados.forEach(x=>{
const data=new Date(x.data)
const mes=data.getMonth()

if(!meses[mes])meses[mes]={r:0,d:0}

if(x.tipo==="RECEITA"){
receitas+=x.valor
meses[mes].r+=x.valor
}else{
despesas+=x.valor
meses[mes].d+=x.valor
}
})

/* 🔥 DESTROI ANTES DE RECRIAR */
if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

/* 🔥 RESUMO (pizza) */
graficoResumo=new Chart(document.getElementById("graficoResumo"),{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[receitas,despesas],
backgroundColor:["#22c55e","#ef4444"]
}]
}
})

/* 🔥 MENSAL (barras) */
const labels=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"]

graficoMensal=new Chart(document.getElementById("graficoMensal"),{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"Receitas",
data:labels.map((_,i)=>meses[i]?.r||0),
backgroundColor:"#22c55e"
},
{
label:"Despesas",
data:labels.map((_,i)=>meses[i]?.d||0),
backgroundColor:"#ef4444"
}
]
}
})

}
  
</script>

</body>
</html>

<script>
function render(){
try{

const tela=safe("telaExtrato")
if(!tela||!tela.classList.contains("telaAtiva"))return

const lista=safe("lista")
const resumo=safe("resumo")

if(!dados||!dados.length){
lista.innerHTML="<div class='card'>Sem registros</div>"
resumo.innerHTML=""
return
}

/* 🔥 AGRUPAR POR MÊS */
const grupos={}
dados.forEach(x=>{
if(!x.data)return
const d=x.data.split("T")[0]
const [ano,mes]=d.split("-")
const chave=ano+"-"+mes
if(!grupos[chave])grupos[chave]=[]
grupos[chave].push(x)
})

const chaves=Object.keys(grupos).sort().reverse()

let html=""
let totalGeralR=0
let totalGeralD=0

chaves.forEach(chave=>{
const listaMes=grupos[chave]

/* 🔥 ORDENAR POR DATA */
listaMes.sort((a,b)=>(a.data||"").localeCompare(b.data||""))

/* 🔥 SOMA */
let r=0,d=0
listaMes.forEach(x=>{
const v=Number(x.valor||0)
if(x.tipo==="RECEITA")r+=v
else d+=v
})

totalGeralR+=r
totalGeralD+=d

const saldo=r-d
const [ano,mes]=chave.split("-")

/* 🔥 HEADER */
html+=`
<div class="card" onclick="toggleMes('${chave}')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
<b>${mes}/${ano}</b>
<div style="display:flex;align-items:center;gap:6px">

<b style="color:${saldo>=0?"#16a34a":"#dc2626"}">
${ocultarSaldo?"R$ ***":formatarMoeda(saldo)}
</b>

<button onclick="event.stopPropagation();toggleSaldo()" style="
background:#e2e8f0;
border-radius:8px;
padding:6px 10px;
font-size:14px;
">
👁
</button>
</div>
</div>
`

/* 🔥 ITENS */
if(!mesesOcultos[chave]){
listaMes.forEach(x=>{
const valor=Number(x.valor||0)
const vis=visibilidade[x.id]===false

html+=`
<div class="card" style="padding:6px;margin-top:4px;display:flex;justify-content:space-between;align-items:center">

<div style="flex:2;font-size:13px">
${modoEdicao
? `<input value="${x.descricao||""}" 
onchange="editarCampo('${x.id}','descricao',this.value)" 
style="width:100%">`
: `${formatarDataBR(x.data)} - ${x.descricao}`
}
</div>

<div style="flex:1;text-align:right;font-weight:bold;color:${x.tipo==="RECEITA"?"#16a34a":"#dc2626"}">
${modoEdicao
? `<input value="${valor}" type="number"
onchange="editarCampo('${x.id}','valor',this.value)"
style="width:90px;text-align:right">`
: vis?"R$ ***":formatarMoeda(valor)
}
</div>

<div style="display:flex;gap:4px">
<button onclick="event.stopPropagation();toggleValor('${x.id}')" style="padding:4px 6px">👁</button>
</div>

</div>
`
})
}

})

lista.innerHTML=html

/* 🔥 TOTAL */
const saldoTotal=totalGeralR-totalGeralD

resumo.innerHTML=`
<div class="card" style="display:flex;justify-content:space-between;align-items:center">
<b>Total Geral</b>
<button onclick="toggleSaldo()" style="background:none">👁</button>
<div style="display:flex;align-items:center;gap:8px">
<b style="color:${saldoTotal>=0?"#16a34a":"#dc2626"}">
${ocultarSaldo?"R$ ***":formatarMoeda(saldoTotal)}
</b>
<button onclick="toggleSaldo()" style="background:none">👁</button>
</div>
</div>
`

}catch(e){
console.error("ERRO RENDER:",e)
}
}
</script>

<script>
function atualizarDashboard(){

if(!dados.length)return

const container=safe("containerExtrato")

let areaGrafico=safe("areaGrafico")

if(!areaGrafico){
areaGrafico=document.createElement("div")
areaGrafico.id="areaGrafico"
areaGrafico.style.textAlign="center"
areaGrafico.style.marginBottom="4px"
container.prepend(areaGrafico)
}

areaGrafico.innerHTML=""

/* 🔥 CANVAS CONTROLADO DE VERDADE */
const canvas=document.createElement("canvas")
canvas.width=TAM_GRAFICO
canvas.height=TAM_GRAFICO
canvas.style.display="block"
canvas.style.margin="0 auto"

areaGrafico.appendChild(canvas)

const ctx=canvas.getContext("2d")

let r=0,d=0

dados.forEach(x=>{
if(x.tipo==="RECEITA")r+=Number(x.valor||0)
else d+=Number(x.valor||0)
})

if(graficoResumo)graficoResumo.destroy()

graficoResumo=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[r,d],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{
responsive:false,
maintainAspectRatio:false,
cutout:"70%",
plugins:{
legend:{position:"bottom"},
tooltip:{enabled:true}
}
}
})

}
</script>

<script>
function detectarCategoria(desc){
desc=desc.toLowerCase()
if(desc.includes("mercado")||desc.includes("super"))return "Alimentação"
if(desc.includes("uber")||desc.includes("99"))return "Transporte"
if(desc.includes("farmacia"))return "Saúde"
if(desc.includes("netflix")||desc.includes("spotify"))return "Lazer"
if(desc.includes("salario"))return "Receita"
return "Outros"
}
</script>


<script>
function resumoCategorias(){
let map={}
dados.forEach(x=>{
let cat=detectarCategoria(x.descricao||"")
if(!map[cat])map[cat]=0
map[cat]+=Number(x.valor||0)*(x.tipo==="DESPESA"?1:0)
})
return map
}
</script>

<script>
function alertaInteligente(){
let r=0,d=0
dados.forEach(x=>{if(x.tipo==="RECEITA")r+=Number(x.valor||0);else d+=Number(x.valor||0)})
let msg=""
if(d>r)msg="⚠️ Você está gastando mais do que ganha"
else if(d>r*0.7)msg="⚠️ Alto nível de gastos"
else msg="✔️ Controle financeiro saudável"

}
</script>



<script>
function calcularScore(){
let r=0,d=0

dados.forEach(x=>{
if(x.tipo==="RECEITA")r+=Number(x.valor||0)
else d+=Number(x.valor||0)
})

let score=0
if(r>0){
score=Math.max(0,Math.min(100,100-(d/r*100)))
}

/* 🔥 GARANTE ELEMENTO */
const el=safe("scoreBox")
if(!el)return

el.innerText="Score: "+score.toFixed(0)

if(score>70)el.style.background="#dcfce7"
else if(score>40)el.style.background="#fef9c3"
else el.style.background="#fee2e2"
}
</script>

<script>
function gerarConta(nome){
const hoje=new Date()
const dd=String(hoje.getDate()).padStart(2,"0")
const mm=String(hoje.getMonth()+1).padStart(2,"0")
const yyyy=hoje.getFullYear()
let prefixo="004"
if(nome.toLowerCase().includes("admin"))prefixo="001"
else if(nome.toLowerCase().includes("neto"))prefixo="002"
else if(nome.toLowerCase().includes("larissa"))prefixo="003"
return prefixo+dd+mm+yyyy
}

function gerarContaUsuario(email){
const hoje=new Date()
const dd=String(hoje.getDate()).padStart(2,"0")
const mm=String(hoje.getMonth()+1).padStart(2,"0")
const yyyy=hoje.getFullYear()
let prefixo="004"
if(email.includes("admin"))prefixo="001"
else if(email.includes("neto"))prefixo="002"
else if(email.includes("larissa"))prefixo="003"
return {
agencia:"01968",
conta:prefixo+dd+mm+yyyy
}
}
</script>

<script>
async function abrirCadastro(){
const nome=prompt("Nome completo:")
if(!nome)return
const email=prompt("Email:")
if(!email)return
const senha=prompt("Senha:")
if(!senha)return
/* 🔥 VERIFICA SE EMAIL JÁ EXISTE */
const {data:existe}=await db
.from("usuarios_lancamentos")
.select("id")
.eq("email",email)
.limit(1)
if(existe && existe.length){
alert("Email já cadastrado")
return
}
/* 🔥 GERAR AGÊNCIA E CONTA */
const contaGerada=gerarContaUsuario(email)
/* 🔥 INSERT (AQUI É O INSERT) */
const {error}=await db
.from("usuarios_lancamentos")
.insert({
nome:nome,
email:email,
senha:senha,
agencia:contaGerada.agencia,
conta:contaGerada.conta,
tipo: email.includes("admin") ? "admin" : "user"
})
if(error){
alert("Erro ao cadastrar")
console.error(error)
return
}
alert("Conta criada com sucesso!")
}
</script>

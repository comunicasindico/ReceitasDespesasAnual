<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.edit{background:#3b82f6;color:#fff}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.resumo{margin-top:20px;padding:10px;background:#111827;border-radius:10px}
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center">
<h1>ReceitasDespesasAnual PRO</h1>
<button onclick="logout()" style="background:#ef4444;color:#fff">Sair</button>
</div>

<div class="topo">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">
<select id="mesBase">
<option value="1">Jan</option>
<option value="2">Fev</option>
<option value="3">Mar</option>
<option value="4">Abr</option>
<option value="5">Mai</option>
<option value="6">Jun</option>
<option value="7">Jul</option>
<option value="8">Ago</option>
<option value="9">Set</option>
<option value="10">Out</option>
<option value="11">Nov</option>
<option value="12">Dez</option>
</select>
<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>

<select id="categoria">
<option>GERAL</option>
<option>CASA</option>
<option>SAÚDE</option>
<option>EDUCAÇÃO</option>
<option>LAZER</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>
<label style="margin-left:10px">
<input type="checkbox" id="recorrente"> Recorrente
</label>

<input type="number" id="diaPadrao" placeholder="Dia" style="width:70px">
<textarea id="importarTexto" placeholder="Cole aqui suas despesas e receitas..." style="width:100%;height:120px;margin-top:10px"></textarea>
<button onclick="importarTexto()">Importar automático</button>
<button onclick="copiarMesAnterior()">Gerar base mês</button>
<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option>
<option value="2">Mar</option><option value="3">Abr</option>
<option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option>
<option value="8">Set</option><option value="9">Out</option>
<option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos Anos</option>
<option>2026</option>
<option>2027</option>
</select>

<select id="filtroTipo" onchange="render()">
<option value="">Todos</option>
<option>RECEITA</option>
<option>DESPESA</option>
</select>
</div>

<div class="resumo" id="resumo"></div>

<canvas id="graficoResumo" style="max-height:180px"></canvas>
<canvas id="graficoMensal" style="max-height:220px;margin-top:10px"></canvas>

<h2 id="total"></h2>
<button onclick="toggleValores()">👁 Mostrar/Ocultar valores</button>

<div style="display:grid;grid-template-columns:120px 1fr 120px 120px;gap:10px;font-weight:bold;margin-top:20px">
<div>Data</div>
<div>Descrição</div>
<div>Categoria</div>
<div>Valor</div>
</div>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* ====================================================
001 – CONFIG SUPABASE
==================================================== */
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* ====================================================
002 – ESTADO GLOBAL
==================================================== */
let dados=[]
let editando=null
let mostrarValores=true
let graficoResumo=null
let graficoMensal=null

/* ====================================================
003 – TOGGLE VALORES
==================================================== */
function toggleValores(){
mostrarValores=!mostrarValores
render()
}

/* ====================================================
004 – CARREGAR DADOS
==================================================== */
async function carregar(){
const{data,error}=await db.from("lancamentos").select("*").order("data",{ascending:true})
if(error)return alert("Erro ao carregar")
dados=data||[]
await gerarRecorrentes()
render()
}

/* ====================================================
005 – SALVAR
==================================================== */
async function salvarRegistro(obj){
if(obj.id){
await db.from("lancamentos").update(obj).eq("id",obj.id)
}else{
await db.from("lancamentos").insert(obj)
}
carregar()
}

/* ====================================================
006 – EXCLUIR
==================================================== */
async function del(id){
await db.from("lancamentos").delete().eq("id",id)
carregar()
}
/* ====================================================
007 – EDITAR POR ID
==================================================== */
function editarPorId(id){

const x = dados.find(d => String(d.id) === String(id))

if(!x){
alert("Registro não encontrado")
return
}

editando = x.id

document.getElementById("data").value = x.data || ""
document.getElementById("desc").value = x.descricao || ""
document.getElementById("tipo").value = x.tipo || "DESPESA"
document.getElementById("categoria").value = x.categoria || "GERAL"
document.getElementById("valor").value = x.valor || 0

// foco automático
document.getElementById("desc").focus()

}
/* ====================================================
008 – ADICIONAR (INTELIGENTE)
==================================================== */
async function add(){

const obj={
data:data.value,
descricao:desc.value.trim(),
tipo:tipo.value,
categoria:categoria.value,
valor:parseFloat(valor.value),
recorrente:document.getElementById("recorrente")?.checked||false,
dia_padrao:parseInt(document.getElementById("diaPadrao")?.value)||null
}

if(!obj.data||!obj.descricao)return alert("Preencha data e descrição")
if(!obj.valor||obj.valor===0)return alert("Valor inválido")

if(editando){
obj.id=editando
editando=null
await salvarRegistro(obj)
return
}

const mesAtual=obj.data.slice(0,7)

const existente=dados.find(x=>
x.descricao.toLowerCase()===obj.descricao.toLowerCase() &&
x.data.slice(0,7)===mesAtual
)

if(existente){
obj.id=existente.id
await salvarRegistro(obj)
alert("Atualizado")
return
}

await salvarRegistro(obj)
}

/* ====================================================
009 – IMPORTADOR (CORRIGIDO)
==================================================== */
async function importarTexto(){

const txt=document.getElementById("importarTexto").value
if(!txt)return alert("Cole o texto")

const linhas=txt.split("\n")

for(const l of linhas){

const m=l.match(/(\d{2}\/\d{2})\s+(.+?)\s+([\d\.,]+)/)
if(!m)continue

let[dia,mes]=m[1].split("/")

let valor=parseFloat(m[3].replace(/\./g,"").replace(/,/g,"."))

let tipo=m[2].toUpperCase().includes("REMUNERA")?"RECEITA":"DESPESA"

await db.from("lancamentos").insert({
data:`2026-${mes}-${dia}`,
descricao:m[2],
tipo:tipo,
categoria:"GERAL",
valor:valor
})

}

alert("Importado com sucesso")
carregar()
}

/* ====================================================
010 – CONTROLE VISUAL POR ITEM
==================================================== */
let visibilidade={}

/* ====================================================
011 – RENDER (PROFISSIONAL)
==================================================== */
function render(){

let saldo=0,receitas=0,despesas=0
lista.innerHTML=""

const dadosFiltrados=dados.filter(x=>x.valor!==0)

dadosFiltrados.forEach(x=>{

if(x.tipo==="RECEITA"){saldo+=x.valor;receitas+=x.valor}
else{saldo-=x.valor;despesas+=x.valor}

lista.innerHTML+=`
<div style="
display:grid;
grid-template-columns:90px 1fr 100px 130px auto;
gap:6px;
background:#1e293b;
padding:6px 8px;
margin:3px 0;
border-radius:6px;
align-items:center;
border-left:3px solid ${x.tipo==="RECEITA"?"#22c55e":"#ef4444"};
font-size:13px;
">

<div style="font-size:12px;color:#94a3b8">
${formatarDataBR(x.data)}
</div>

<div style="font-weight:600">
${x.descricao}
</div>

<div style="font-size:12px;color:#94a3b8">
${x.categoria}
</div>

<div style="display:flex;justify-content:flex-end;align-items:center;gap:6px">

<span style="min-width:90px;text-align:right;font-variant-numeric:tabular-nums">
${visibilidade[x.id]===false?"••••":"R$ "+formatarMoeda(x.valor)}
</span>

<button onclick="toggleValor('${x.id}')" style="
background:#22c55e;
border:none;
border-radius:6px;
padding:4px 6px;
cursor:pointer;
">
👁
</button>

</div>

<div style="display:flex;gap:4px">
<button class="edit" onclick="editarPorId('${x.id}')">✏️</button>
<button class="delete" onclick="del('${x.id}')">🗑️</button>
</div>

</div>
`
})

document.getElementById("total").innerText=
"Saldo: "+(mostrarValores ? "R$ "+formatarMoeda(saldo) : "••••")

document.getElementById("resumo").innerText=
`Receitas: ${mostrarValores ? "R$ "+formatarMoeda(receitas) : "••••"} | Despesas: ${mostrarValores ? "R$ "+formatarMoeda(despesas) : "••••"}`

atualizarDashboard()
}
/* ====================================================
011 – FORMATAR MOEDA
==================================================== */
function formatarMoeda(v){
return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})
}
/* ====================================================
012 – TOGGLE INDIVIDUAL
==================================================== */
function toggleValor(id){
visibilidade[id]=!visibilidade[id]
render()
}

/* ====================================================
013 – DASHBOARD (CORRIGIDO)
==================================================== */
function atualizarDashboard(){

if(graficoResumo)graficoResumo.destroy()
if(graficoMensal)graficoMensal.destroy()

let r=0,d=0,meses={}

dados.forEach(x=>{
let m=new Date(x.data).getMonth()
if(!meses[m])meses[m]={r:0,d:0}
if(x.tipo==="RECEITA"){r+=x.valor;meses[m].r+=x.valor}
else{d+=x.valor;meses[m].d+=x.valor}
})

graficoResumo=new Chart(document.getElementById("graficoResumo"),{
type:"doughnut",
data:{
labels:["Receitas","Despesas"],
datasets:[{
data:[r,d],
backgroundColor:["#22c55e","#ef4444"],
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
position:"bottom",
labels:{
color:"#fff",
boxWidth:12,
padding:15
}
}
}
}
})

const labels=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"]

graficoMensal=new Chart(document.getElementById("graficoMensal"),{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"Receitas",
data:labels.map((_,i)=>meses[i]?.r||0),
backgroundColor:"#22c55e",
borderRadius:6
},
{
label:"Despesas",
data:labels.map((_,i)=>meses[i]?.d||0),
backgroundColor:"#ef4444",
borderRadius:6
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
position:"bottom",
labels:{
color:"#fff"
}
}
},
scales:{
x:{
ticks:{color:"#94a3b8"},
grid:{display:false}
},
y:{
ticks:{color:"#94a3b8"},
grid:{color:"#1e293b"}
}
}
}
})
}

/* ====================================================
014 – COPIAR MÊS ANTERIOR
==================================================== */
async function copiarMesAnterior(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()
const mesAnterior=mes-1

const {data:anteriores}=await db.from("lancamentos").select("*")
.gte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mesAnterior+1).padStart(2,"0")}-31`)

const {data:atuais}=await db.from("lancamentos").select("*")
.gte("data",`${ano}-${String(mes+1).padStart(2,"0")}-01`)
.lte("data",`${ano}-${String(mes+1).padStart(2,"0")}-31`)

let set=new Set((atuais||[]).map(x=>x.descricao))

for(const x of (anteriores||[])){
if(!set.has(x.descricao)){
await db.from("lancamentos").insert({
data:`${ano}-${String(mes+1).padStart(2,"0")}-01`,
descricao:x.descricao,
tipo:x.tipo,
categoria:x.categoria,
valor:0
})
}
}

alert("Base criada")
carregar()
}

/* ====================================================
015 – RECORRÊNCIA AUTOMÁTICA
==================================================== */
async function gerarRecorrentes(){

const hoje=new Date()
const ano=hoje.getFullYear()
const mes=hoje.getMonth()+1

const {data:rec}=await db.from("lancamentos").select("*").eq("recorrente",true)

for(const r of (rec||[])){

let dia=r.dia_padrao||1
let dataNova=`${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`

const existe=dados.find(x=>x.descricao===r.descricao && x.data===dataNova)

if(!existe){
await db.from("lancamentos").insert({
data:dataNova,
descricao:r.descricao,
tipo:r.tipo,
categoria:r.categoria,
valor:r.valor,
recorrente:true,
dia_padrao:dia
})
}
}
}
/* ====================================================
016 – FORMATAR DATABR
==================================================== */
  function formatarDataBR(data){
if(!data)return ""
const d=new Date(data)
return String(d.getDate()).padStart(2,"0")+"/"+
String(d.getMonth()+1).padStart(2,"0")+"/"+
d.getFullYear()
}
/* ====================================================
017 – LOGOUT
==================================================== */
function logout(){
localStorage.clear()
location.reload()
}

carregar()


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ReceitasDespesasAnual</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer;background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
.topo{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>

<h1>ReceitasDespesasAnual</h1>

<div class="topo">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Descrição">
<select id="tipo">
<option>DESPESA</option>
<option>RECEITA</option>
</select>
<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Adicionar</button>

<select id="filtroMes" onchange="render()">
<option value="">Todos Meses</option>
<option value="0">Jan</option><option value="1">Fev</option>
<option value="2">Mar</option><option value="3">Abr</option>
<option value="4">Mai</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Ago</option>
<option value="8">Set</option><option value="9">Out</option>
<option value="10">Nov</option><option value="11">Dez</option>
</select>

<select id="filtroAno" onchange="render()">
<option value="">Todos Anos</option>
<option>2026</option>
<option>2027</option>
</select>
</div>

<h2 id="total"></h2>

<div id="lista"></div>

<script>
let dados=JSON.parse(localStorage.getItem("dados")||"[]")

function salvar(){
localStorage.setItem("dados",JSON.stringify(dados))
}

function add(){
const d=document.getElementById("data").value
const desc=document.getElementById("desc").value
const tipo=document.getElementById("tipo").value
const valor=parseFloat(document.getElementById("valor").value)

if(!d||!desc||!valor)return alert("Preencha tudo")

dados.push({id:Date.now(),d,desc,tipo,valor})
salvar()
render()
}

function del(id){
dados=dados.filter(x=>x.id!==id)
salvar()
render()
}

function render(){
const lista=document.getElementById("lista")
lista.innerHTML=""

let total=0

const mesFiltro=document.getElementById("filtroMes").value
const anoFiltro=document.getElementById("filtroAno").value

dados.sort((a,b)=>new Date(a.d)-new Date(b.d))

dados.forEach(x=>{
const data=new Date(x.d)
const mes=data.getMonth().toString()
const ano=data.getFullYear().toString()

if((mesFiltro && mes!==mesFiltro)||(anoFiltro && ano!==anoFiltro))return

if(x.tipo==="RECEITA")total+=x.valor
else total-=x.valor

lista.innerHTML+=`
<div class="card">
${x.d} - ${x.desc} - R$ ${x.valor.toFixed(2)}
<button class="delete" onclick="del(${x.id})">Excluir</button>
</div>
`
})

document.getElementById("total").innerText="Saldo: R$ "+total.toFixed(2)
}

render()
</script>

</body>
</html>
